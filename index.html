    <style>
        :root {
            --gold: #FFC107; --gold-dark: #B8860B; --gold-light: #FFD54F;

            font-family: 'Cairo', 'Segoe UI', sans-serif;

            height: 100dvh; display: flex; justify-content: center; align-items: center;

        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes scaleIn { from { transform:scale(0.8); opacity:0; } to { transform:scale(1); opacity:1; } }
        @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
        @keyframes slideDown { from { transform:translateY(-30px); opacity:0; } to { transform:translateY(0); opacity:1; } }
        @keyframes messageIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        @keyframes messageInLeft { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
        @keyframes messageInRight { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.04);} 100%{transform:scale(1);} }
        @keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }

        @keyframes popIn { 0%{transform:scale(0); opacity:0;} 80%{transform:scale(1.06);} 100%{transform:scale(1); opacity:1;} }

        .input-field:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,193,7,0.3); }

        .btn { display: inline-block; padding: 14px 28px; border-radius: 28px; border: none; font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: var(--transition); background: var(--gold-gradient); color: #000; width: 100%; margin-top: 10px; box-shadow: 0 4px 16px rgba(255,193,7,0.3); background-size: 200% 200%; animation: gradientShift 3s ease infinite; font-family: 'Cairo', sans-serif; position: relative; overflow: hidden; }
        .btn:active { transform: scale(0.96); }

        .btn-danger { background: linear-gradient(135deg, #FF4757, #FF6B81); color: #fff; animation: none; }

        .support-link img { width: 44px; height: 44px; border-radius: 12px; }
        .support-link span { font-size: 0.7rem; }

        .stories-bar { display: flex; gap: 12px; overflow-x: auto; padding: 8px 0; margin-bottom: 12px; scroll-snap-type: x mandatory; }
        .stories-bar::-webkit-scrollbar { display: none; }
        .story-item { text-align: center; cursor: pointer; flex-shrink: 0; scroll-snap-align: start; }
        .story-item .story-ring { width: 62px; height: 62px; border-radius: 50%; padding: 3px; background: var(--gold-gradient); margin-bottom: 4px; }
        .story-item .story-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg); }
        .story-item span { font-size: 0.65rem; color: var(--text2); display: block; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .story-item.viewed .story-ring { background: #444; }

        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 8px; }
        .media-item { border-radius: 10px; overflow: hidden; cursor: pointer; aspect-ratio: 1; position: relative; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
        .media-item .file-placeholder { background: var(--surface2); border-radius: 10px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .media-item .media-type-badge { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; font-size: 0.55rem; }

        .user-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: var(--surface2); margin: 4px 0; border-radius: 12px; cursor: pointer; transition: var(--transition); }
        .user-list-item:hover { background: var(--surface3); }
        .user-list-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
        .user-list-item .user-name { font-weight: bold; font-size: 0.9rem; }
        .user-list-item .user-status { font-size: 0.68rem; }

        .stats-card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; text-align: center; }
        .stats-card .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
        .stats-card .stat-item .value { font-size: 1.6rem; color: var(--gold); font-weight: bold; }
        .stats-card .stat-item .label { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
        .stats-card .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 8px; }
        .stats-card .progress-fill { height: 100%; background: var(--gold-gradient); border-radius: 3px; transition: width 0.6s ease; }

        .empty-state { text-align: center; padding: 40px 15px; }
        .empty-state .icon { font-size: 4rem; margin-bottom: 12px; }
        .empty-state h3 { color: var(--text2); font-size: 1.1rem; margin-bottom: 8px; }
        .empty-state p { color: var(--text3); font-size: 0.85rem; margin-bottom: 10px; }

        .confetti-piece { position: fixed; width: 10px; height: 10px; z-index: 9999; pointer-events: none; animation: confetti-fall 3s linear forwards; }
        
        .toast-notification { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 24px; font-weight: bold; z-index: 9999; box-shadow: 0 8px 25px rgba(0,0,0,0.5); animation: slideDown 0.4s ease-out; color: #000; max-width: 90%; text-align: center; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        
        .ripple { position: relative; overflow: hidden; }
        
        @media (max-width: 380px) {
            .groups-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .msg-bubble { max-width: 88%; }
        }
    </style>
</head>
<body>
<div id="app">
    <div id="loadingOverlay" class="loading-overlay hidden"><div class="loading-spinner"></div><p class="loading-text">⏳ جاري التحميل...</p></div>
    
    <div id="loginScreen" class="login-container">
        <div class="login-card scale-in">
            <div class="app-icon">🏫</div>
            <h1>Web Egypt</h1>
            <p class="subtitle">منصة التعليم الذكية المتطورة</p>
            <input type="text" id="codeInput" class="input-field" placeholder="🔑 أدخل الكود" autocomplete="off" maxlength="10" inputmode="text" style="text-transform: uppercase;">
            <button class="btn pulse-animation" onclick="studentLogin()">🚀 دخول</button>
            <p id="loginError" class="error-text"></p>
            <p style="color:var(--text3); font-size:0.65rem; margin-top:12px;">© 2026 Web Egypt - جميع الحقوق محفوظة</p>
        </div>
    </div>
    
    <div id="mainScreen" class="hidden" style="flex:1; display:flex; flex-direction:column;">
        <div class="app-header">
            <div class="logo" onclick="switchTab('groups')">Web Egypt</div>
            <div class="header-icons">
                <button class="icon-btn" onclick="navigate('stories')" title="القصص">📖<span class="notification-dot" id="storiesDot" style="display:none;"></span></button>
                <button class="icon-btn" onclick="navigate('support')" title="الدعم">📞</button>
                <button class="icon-btn" onclick="showConfirmLogout()" title="خروج">🚪</button>
            </div>
        </div>
        <div id="contentArea" class="screen fade-in"></div>
        <div class="bottom-tabs" id="bottomTabs">
            <div class="bottom-tab active" onclick="switchTab('groups')"><span class="tab-icon">📋</span>المجموعات<span class="tab-badge hidden" id="groupsUnreadBadge">0</span></div>
            <div class="bottom-tab" onclick="switchTab('chats')"><span class="tab-icon">💬</span>المحادثات<span class="tab-badge hidden" id="chatsUnreadBadge">0</span></div>
            <div class="bottom-tab" onclick="switchTab('stats')"><span class="tab-icon">📊</span>إحصائياتي</div>
            <div class="bottom-tab" onclick="switchTab('more')"><span class="tab-icon">📱</span>المزيد</div>
        </div>
    </div>
    
    <div id="imageViewer" class="image-viewer hidden" onclick="closeImageViewer(event)">
        <span class="close-viewer" onclick="document.getElementById('imageViewer').classList.add('hidden')">✕</span>
        <img id="viewerImage" src="" alt="صورة">
    </div>
</div>

<script>
    // ==========================================
    // FIREBASE CONFIGURATION
    // ==========================================
    firebase.initializeApp({ 
        apiKey: "AIzaSyAvMxzDf2nZ7l26Cl-xunqe6Dcghi_aCCY", 
        authDomain: "schoolchatapp-2c5b7.firebaseapp.com", 
        projectId: "schoolchatapp-2c5b7", 
        storageBucket: "schoolchatapp-2c5b7.appspot.com", 
        messagingSenderId: "979995006662", 
        appId: "1:979995006662:web:eb08f33a68f41cc283e9c7" 
    });
    const db = firebase.firestore();
    db.settings({ merge: true, cacheSizeBytes: 10485760 });
    
    const CLOUD_NAME = "dlcjb79w0";
    const UPLOAD_PRESET = "school_preset";

    // ==========================================
    // GLOBAL STATE
    // ==========================================
    let currentUser = null;
    let currentGroupId = null;
    let currentGroupData = null;
    let chatUnsubscribe = null;
    let typingUnsubscribe = null;
    let typingTimeout = null;
    let currentPrivateChatUser = null;
    let allListeners = [];
    let currentTab = 'groups';
    let unreadCounts = { groups: {}, privateChats: {} };
    let notificationSound = null;
    let isDarkMode = true;

    // ==========================================
    // SECURITY - ANTI-THEFT PROTECTION
    // ==========================================
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U') || (e.ctrlKey && e.key === 'S')) {
            e.preventDefault();
            return false;
        }
    });
    document.addEventListener('selectstart', function(e) { e.preventDefault(); });
    document.addEventListener('dragstart', function(e) { e.preventDefault(); });
    
    // Clear console warning
    setInterval(function() {
        if (window.console && console.clear) { /* keep console clean */ }
    }, 3000);

    // ==========================================
    // UTILITY FUNCTIONS
    // ==========================================
    function showLoading(msg) { 
        msg = msg || '⏳ جاري التحميل...';
        document.getElementById('loadingOverlay').classList.remove('hidden');
        document.querySelector('.loading-text').textContent = msg;
    }
    function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }
    
    function showToast(msg, type) {
        type = type || 'info';
        var colors = { success: '#2ED573', error: '#FF4757', info: '#FFC107', warning: '#FFA502' };
        var icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
        var existing = document.querySelector('.toast-notification');
        if (existing) existing.remove();
        
        var toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.background = colors[type] || colors.info;
        toast.style.color = (type === 'info' || type === 'warning') ? '#000' : '#fff';
        toast.textContent = (icons[type] || '') + ' ' + msg;
        document.body.appendChild(toast);
        setTimeout(function() { 
            toast.style.opacity = '0'; 
            toast.style.transition = '0.3s'; 
            setTimeout(function() { if (toast.parentNode) toast.remove(); }, 300); 
        }, 2500);
    }

    function cleanListeners() {
        allListeners.forEach(function(fn) { try { fn(); } catch(e) {} });
        allListeners = [];
        if (chatUnsubscribe) { chatUnsubscribe(); chatUnsubscribe = null; }
        if (typingUnsubscribe) { typingUnsubscribe(); typingUnsubscribe = null; }
        clearTimeout(typingTimeout);
    }

    function formatTime(date) {
        if (!date) return '';
        try {
            var d = date.toDate ? date.toDate() : new Date(date);
            return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        } catch(e) { return ''; }
    }

    function formatDate(date) {
        if (!date) return '';
        try {
            var d = date.toDate ? date.toDate() : new Date(date);
            return d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
        } catch(e) { return ''; }
    }
    
    function getDeviceID() {
        var deviceID = localStorage.getItem('webEgyptDeviceID');
        if (!deviceID) {
            deviceID = 'DEV-' + Math.random().toString(36).substr(2, 10) + '-' + Date.now().toString(36);
            localStorage.setItem('webEgyptDeviceID', deviceID);
        }
        return deviceID;
    }
    
    function playNotificationSound() {
        try {
            if (!notificationSound) {
                // Create audio context for notification beep
                var AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    var ctx = new AudioContext();
                    var oscillator = ctx.createOscillator();
                    var gainNode = ctx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    gainNode.gain.value = 0.3;
                    oscillator.start();
                    oscillator.stop(ctx.currentTime + 0.15);
                    setTimeout(function() {
                        var osc2 = ctx.createOscillator();
                        osc2.connect(gainNode);
                        osc2.frequency.value = 1000;
                        osc2.type = 'sine';
                        osc2.start();
                        osc2.stop(ctx.currentTime + 0.15);
                    }, 150);
                }
            }
        } catch(e) { /* silent fail */ }
    }
    
    function sendBrowserNotification(title, body) {
        title = title || 'Web Egypt';
        body = body || 'لديك رسالة جديدة';
        if ('Notification' in window && Notification.permission === 'granted') {
            try {
                new Notification(title, { body: body, icon: 'amg.1.jpg', badge: 'amg.1.jpg' });
            } catch(e) { /* silent */ }
        } else if ('Notification' in window && Notification.permission !== 'denied') {
            Notification.requestPermission();
        }
    }
    
    function launchConfetti() {
        var colors = ['#FFC107', '#FF4757', '#2ED573', '#1E90FF', '#FFA502', '#FFD54F', '#FF6B81'];
        for (var i = 0; i < 50; i++) {
            setTimeout(function() {
                var piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.width = (Math.random() * 8 + 6) + 'px';
                piece.style.height = (Math.random() * 8 + 6) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(piece);
                setTimeout(function() { if (piece.parentNode) piece.remove(); }, 3500);
            }, i * 30);
        }
    }

    // ==========================================
    // BACK BUTTON SUPPORT
    // ==========================================
    window.addEventListener('popstate', function(e) {
        if (currentGroupId || currentPrivateChatUser) {
            if (currentPrivateChatUser) {
                currentPrivateChatUser = null;
                switchTab('chats');
            } else if (currentGroupId) {
                currentGroupId = null;
                switchTab('groups');
            }
        }
    });

    // ==========================================
    // NAVIGATION
    // ==========================================
    function switchTab(tab) {
        currentTab = tab;
        currentGroupId = null;
        currentPrivateChatUser = null;
        cleanListeners();
        
        var tabs = document.querySelectorAll('.bottom-tab');
        tabs.forEach(function(t) { t.classList.remove('active'); });
        var tabMap = { 'groups': 0, 'chats': 1, 'stats': 2, 'more': 3 };
        if (tabs[tabMap[tab]]) tabs[tabMap[tab]].classList.add('active');
        
        var content = document.getElementById('contentArea');
        content.classList.remove('fade-in');
        void content.offsetWidth;
        content.classList.add('fade-in');
        content.scrollTop = 0;
        
        switch(tab) {
            case 'groups': renderGroups(); break;
            case 'chats': renderChatsList(); break;
            case 'stats': renderStudentStats(); break;
            case 'more': renderMorePage(); break;
        }
        
        updateAllUnreadBadges();
    }

    function navigate(page, data) {
        data = data || null;
        cleanListeners();
        if (page !== 'chat') { currentGroupId = null; currentPrivateChatUser = null; }
        
        var content = document.getElementById('contentArea');
        content.classList.remove('fade-in');
        void content.offsetWidth;
        content.classList.add('fade-in');
        content.scrollTop = 0;
        
        switch(page) {
            case 'groups': renderGroups(); break;
            case 'chat': renderChat(data); break;
            case 'stories': renderStories(); break;
            case 'private-chats': renderPrivateChatsList(); break;
            case 'private-chat': renderPrivateChat(data); break;
            case 'media': renderMediaPage(); break;
            case 'support': renderSupport(); break;
            case 'group-info': renderGroupInfo(); break;
            case 'stats': renderStudentStats(); break;
            case 'settings': renderSettings(); break;
            case 'notes': renderNotes(); break;
            case 'leaderboard': renderLeaderboard(); break;
            case 'report': showReportModal(data); break;
            default: renderGroups();
        }
    }

    // ==========================================
    // AUTH - LOGIN WITH CODE
    // ==========================================
    window.studentLogin = async function() {
        var codeInput = document.getElementById('codeInput');
        var code = codeInput.value.trim().toUpperCase();
        var errEl = document.getElementById('loginError');
        errEl.textContent = '';
        
        if (!code) {
            errEl.textContent = '⚠️ الرجاء إدخال الكود';
            codeInput.classList.add('shake-animation');
            setTimeout(function() { codeInput.classList.remove('shake-animation'); }, 500);
            return;
        }
        if (code.length < 4) { errEl.textContent = '⚠️ الكود قصير جداً (4 أحرف على الأقل)'; return; }
        
        showLoading('🔍 جاري التحقق من الكود...');
        var deviceID = getDeviceID();
        
        try {
            var codeSnap = await db.collection('student_codes').where('code', '==', code).limit(1).get();
            if (codeSnap.empty) throw new Error('❌ الكود غير صحيح');
            
            var codeDoc = codeSnap.docs[0];
            var codeData = codeDoc.data();
            
            if (codeData.usedBy && codeData.usedByDevice && codeData.usedByDevice !== deviceID) {
                throw new Error('⚠️ الكود مستخدم على جهاز آخر');
            }
            
            var userId = codeData.studentNumber || codeDoc.id;
            var userRef = db.collection('users').doc(userId);
            
            if (!codeData.usedBy) {
                await codeDoc.ref.update({
                    usedBy: userId,
                    usedByDevice: deviceID,
                    activatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            var userDoc = await userRef.get();
            if (!userDoc.exists) {
                await userRef.set({
                    userID: userId,
                    name: codeData.studentName || 'طالب',
                    phone: codeData.studentNumber || '',
                    role: 'user',
                    chatBg: '',
                    online: true,
                    deviceID: deviceID,
                    totalMessages: 0,
                    groupsJoined: codeData.allowedGroups ? codeData.allowedGroups.length : 0,
                    points: 0,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } else {
                await userRef.update({
                    online: true,
                    deviceID: deviceID,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            if (codeData.allowedGroups && codeData.allowedGroups.length > 0) {
                var batch = db.batch();
                codeData.allowedGroups.forEach(function(groupId) {
                    var gr = db.collection('groups').doc(groupId);
                    batch.update(gr, { members: firebase.firestore.FieldValue.arrayUnion(userId) });
                });
                await batch.commit();
                
                await Promise.all(codeData.allowedGroups.map(function(groupId) {
                    return db.collection('groups').doc(groupId).get().then(function(gd) {
                        return db.collection('groups').doc(groupId).update({
                            memberCount: (gd.data().members || []).length
                        });
                    });
                }));
            }
            
            var finalUserDoc = await userRef.get();
            var u = finalUserDoc.data();
            currentUser = {
                uid: userId,
                name: u.name || 'طالب',
                phone: u.phone || '',
                role: u.role || 'user',
                chatBg: u.chatBg || '',
                online: true,
                totalMessages: u.totalMessages || 0,
                groupsJoined: u.groupsJoined || 0,
                points: u.points || 0
            };
            
            // ===== SAVE CODE & USER ID PERMANENTLY =====
            localStorage.setItem('webEgyptUserID', userId);
            localStorage.setItem('webEgyptCode', code);
            localStorage.setItem('webEgyptLastLogin', Date.now());
            
            hideLoading();
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            switchTab('groups');
            launchConfetti();
            showToast('✅ أهلاً بك ' + currentUser.name + '!', 'success');
            
            // Start monitoring account deletion
            monitorAccountDeletion();
            
        } catch(e) {
            hideLoading();
            errEl.textContent = e.message || 'حدث خطأ';
        }
    };

    async function autoLogin() {
        var savedUserID = localStorage.getItem('webEgyptUserID');
        var savedCode = localStorage.getItem('webEgyptCode');
        var deviceID = getDeviceID();
        
        if (!savedUserID) return false;
        
        try {
            var userDoc = await db.collection('users').doc(savedUserID).get();
            if (!userDoc.exists) {
                // User was deleted
                localStorage.removeItem('webEgyptUserID');
                localStorage.removeItem('webEgyptCode');
                return false;
            }
            
            var userData = userDoc.data();
            if (userData.banned) {
                localStorage.removeItem('webEgyptUserID');
                localStorage.removeItem('webEgyptCode');
                return false;
            }
            
            // Verify code exists and matches device
            if (savedCode) {
                var codeSnap = await db.collection('student_codes')
                    .where('code', '==', savedCode)
                    .where('usedByDevice', '==', deviceID)
                    .limit(1)
                    .get();
                
                if (codeSnap.empty && userData.role !== 'admin') {
                    // Code invalid, but user exists - still allow login
                }
            }
            
            currentUser = {
                uid: savedUserID,
                name: userData.name || 'طالب',
                phone: userData.phone || '',
                role: userData.role || 'user',
                chatBg: userData.chatBg || '',
                online: true,
                totalMessages: userData.totalMessages || 0,
                groupsJoined: userData.groupsJoined || 0,
                points: userData.points || 0
            };
            
            await db.collection('users').doc(savedUserID).update({
                online: true,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            return true;
        } catch(e) {
            return false;
        }
    }
    
    function monitorAccountDeletion() {
        if (!currentUser) return;
        var unsub = db.collection('users').doc(currentUser.uid)
            .onSnapshot(function(doc) {
                if (!doc.exists) {
                    // Account was deleted by admin
                    showToast('⚠️ تم حذف حسابك بواسطة الأدمن', 'error');
                    setTimeout(function() {
                        logout(true);
                    }, 2000);
                }
            });
        allListeners.push(unsub);
    }

    function showConfirmLogout() {
        var modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
        <div class="modal">
            <span class="close-modal" onclick="this.closest('.modal-overlay').remove()">✕</span>
            <h3>🚪 تأكيد الخروج</h3>
            <p style="text-align:center; color:var(--text2); margin:12px 0;">هل أنت متأكد من الخروج؟<br><small style="color:var(--text3);">سيتم حفظ بياناتك تلقائياً</small></p>
            <button class="btn btn-danger" onclick="logout(); this.closest('.modal-overlay').remove();">🚪 نعم، خروج</button>
            <button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()" style="width:100%; margin-top:6px;">إلغاء</button>
        </div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
    }

    window.logout = function(forced) {
        forced = forced || false;
        if (currentUser) {
            db.collection('users').doc(currentUser.uid).update({ online: false }).catch(function() {});
        }
        currentUser = null;
        currentGroupId = null;
        
        if (!forced) {
            // Keep code saved for auto-login
            localStorage.removeItem('webEgyptUserID');
            localStorage.removeItem('webEgyptCode');
        }
        
        cleanListeners();
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('codeInput').value = '';
    };
    
    window.addEventListener('beforeunload', function() {
        if (currentUser) {
            try { db.collection('users').doc(currentUser.uid).update({ online: false }); } catch(e) {}
        }
    });

    // ==========================================
    // GROUPS
    // ==========================================
    function renderGroups() {
        var content = document.getElementById('contentArea');
        content.innerHTML = `
        <h2 class="section-title">📚 مجموعاتي <span class="refresh-btn" onclick="renderGroups()">🔄</span></h2>
        <div id="groupsList" class="groups-grid">
            <p style="color:var(--text2); text-align:center; grid-column:1/-1;">⏳ جاري التحميل...</p>
        </div>`;
        
        var unsub = db.collection('groups')
            .where('members', 'array-contains', currentUser.uid)
            .onSnapshot(function(snap) {
                var listEl = document.getElementById('groupsList');
                if (!listEl) return;
                
                if (snap.empty) {
                    listEl.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">📭</div>
                        <h3>لم تنضم لأي مجموعة</h3>
                        <p>تواصل مع الأدمن للحصول على كود الدخول</p>
                    </div>`;
                    return;
                }
                
                var html = '';
                snap.forEach(function(doc) {
                    var g = doc.data();
                    var perms = g.permissions || {};
                    var restrictions = [];
                    if (perms.allowText === false) restrictions.push('📝');
                    if (perms.allowImages === false) restrictions.push('🖼️');
                    if (perms.allowVideos === false) restrictions.push('🎥');
                    if (perms.allowFiles === false) restrictions.push('📎');
                    if (perms.allowAudio === false) restrictions.push('🎤');
                    
                    var unread = unreadCounts.groups[doc.id] || 0;
                    
                    html += `
                    <div class="group-card pop-in" onclick="openGroupChat('${doc.id}')">
                        <span class="member-count">👥 ${g.memberCount || 0}</span>
                        ${g.isLocked ? '<span class="locked-badge">🔒</span>' : ''}
                        ${restrictions.length > 0 ? '<span class="restriction-indicator">🚫 ' + restrictions.length + '</span>' : ''}
                        ${unread > 0 ? '<span class="unread-badge">' + unread + '</span>' : ''}
                        <img src="${g.picture || 'https://via.placeholder.com/60'}" alt="صورة" loading="lazy" onerror="this.src='https://via.placeholder.com/60'">
                        <h3>${g.name || 'مجموعة'}</h3>
                        <p>${(g.description || '').substring(0, 25)}</p>
                    </div>`;
                });
                listEl.innerHTML = html;
            }, function(error) {
                console.error('Groups listener error:', error);
            });
        
        allListeners.push(unsub);
    }

    function openGroupChat(groupId) {
        currentGroupId = groupId;
        unreadCounts.groups[groupId] = 0;
        navigate('chat');
    }

    // ==========================================
    // CHAT - FULL FEATURED
    // ==========================================
    function renderChat(groupId) {
        if (groupId) currentGroupId = groupId;
        if (!currentGroupId) { switchTab('groups'); return; }
        
        var content = document.getElementById('contentArea');
        content.innerHTML = '<div style="text-align:center; padding:50px;"><div class="loading-spinner" style="margin:0 auto;"></div><p style="color:var(--gold); margin-top:12px;">⏳ جاري فتح المحادثة...</p></div>';
        
        db.collection('groups').doc(currentGroupId).get().then(function(doc) {
            if (!doc.exists) { switchTab('groups'); return; }
            
            currentGroupData = doc.data();
            var g = currentGroupData;
            var isLocked = g.isLocked || false;
            var isAdmin = (g.adminID === currentUser.uid);
            var canWrite = isAdmin || !isLocked;
            var canWriteText = canWrite;
            var canUploadAnyMedia = canWrite;
            
            var html = `
            <div class="chat-fullscreen">
                <div class="chat-header-bar">
                    <span class="back-btn" onclick="switchTab('groups')">⬅️</span>
                    <img src="${g.picture || 'https://via.placeholder.com/40'}" alt="صورة" onerror="this.src='https://via.placeholder.com/40'">
                    <div class="group-info">
                        <div class="group-name">${g.name || 'مجموعة'}</div>
                        <div class="group-subtitle">
                            ${isLocked ? '🔒 مقفولة' : '🟢 مفتوحة'} | 👥 ${g.memberCount || 0} | 
                            <span class="typing-status" id="typingStatus"></span>
                        </div>
                    </div>
                    <button class="icon-btn" onclick="navigate('group-info')" title="معلومات">ℹ️</button>
                    <button class="icon-btn" onclick="navigate('report','${currentGroupId}')" title="تبليغ">🚩</button>
                </div>`;
            
            if (isLocked && !isAdmin) {
                html += '<div class="locked-banner">🔒 المجموعة مقفولة بواسطة المشرف - لا يمكنك الكتابة</div>';
            }
            
            html += `
                <div class="chat-messages-area" id="chatMessages" style="background-image:url('${currentUser.chatBg || ''}');"></div>
                <div class="chat-input-bar">`;
            
            if (canUploadAnyMedia) {
                html += '<button class="icon-circle-btn attach" onclick="uploadMedia()" title="رفع ملفات">📎</button>';
            }
            
            var placeholder = 'اكتب رسالة...';
            if (isLocked && !isAdmin) placeholder = '🔒 المجموعة مقفولة';
            else if (!canWrite) placeholder = '🔐 لا يمكنك الكتابة';
            
            html += `
                <input id="msgInput" placeholder="${placeholder}" onkeydown="if(event.key==='Enter')sendMessage()" oninput="handleTyping()" autocomplete="off" ${!canWriteText ? 'disabled' : ''}>
                <button class="icon-circle-btn send" onclick="sendMessage()" ${!canWriteText ? 'disabled' : ''}>➤</button>
            </div></div>`;
            
            content.innerHTML = html;
            loadMessages();
            loadTypingIndicator();
            
            // إضافة زرار النزول لآخر رسالة
            setTimeout(function() {
                var chatArea = document.getElementById('chatMessages');
                if (chatArea) {
                    var scrollBtn = document.createElement('button');
                    scrollBtn.className = 'scroll-to-bottom-btn hidden';
                    scrollBtn.innerHTML = '↓';
                    scrollBtn.setAttribute('aria-label', 'النزول لآخر رسالة');
                    scrollBtn.onclick = function() {
                        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
                        scrollBtn.classList.add('hidden');
                        unreadCounts.groups[currentGroupId] = 0;
                        updateAllUnreadBadges();
                    };
                    chatArea.parentElement.appendChild(scrollBtn);
                }
            }, 300);
            
        }).catch(function(e) {
            content.innerHTML = '<div class="empty-state"><div class="icon">❌</div><h3>حدث خطأ</h3><p>يرجى المحاولة مرة أخرى</p><button class="btn btn-outline btn-sm" onclick="switchTab(\'groups\')">⬅️ رجوع</button></div>';
        });
    }

    function loadMessages() {
        var div = document.getElementById('chatMessages'); 
        if (!div) return; 
        if (chatUnsubscribe) chatUnsubscribe();
        
        var lastDate = null;
        var userScrolledUp = false;
        var unreadCount = 0;
        var scrollTimeout = null;
        
        function updateScrollButton() {
            var scrollBtn = document.querySelector('.scroll-to-bottom-btn');
            if (!scrollBtn) return;
            
            var atBottom = div.scrollHeight - div.scrollTop - div.clientHeight < 80;
            
            if (atBottom) {
                scrollBtn.classList.add('hidden');
                unreadCount = 0;
                unreadCounts.groups[currentGroupId] = 0;
                updateAllUnreadBadges();
            } else {
                scrollBtn.classList.remove('hidden');
                if (unreadCount > 0) {
                    scrollBtn.innerHTML = '↓<span class="unread-count-badge">' + unreadCount + '</span>';
                } else {
                    scrollBtn.innerHTML = '↓';
                }
            }
        }
        
        div.addEventListener('scroll', function() {
            var bottom = div.scrollHeight - div.scrollTop - div.clientHeight;
            userScrolledUp = bottom > 150;
            updateScrollButton();
            
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(function() {
                if (div.scrollHeight - div.scrollTop - div.clientHeight < 80) {
                    userScrolledUp = false;
                }
            }, 1500);
        }, { passive: true });
        
        div.addEventListener('touchmove', function() {
            var bottom = div.scrollHeight - div.scrollTop - div.clientHeight;
            userScrolledUp = bottom > 100;
        }, { passive: true });
        
        div.addEventListener('touchend', function() { updateScrollButton(); }, { passive: true });
        
        var unsub = db.collection('groups').doc(currentGroupId).collection('messages')
            .orderBy('timestamp', 'asc')
            .onSnapshot(function(snap) {
                var prevScrollHeight = div.scrollHeight;
                var wasNearBottom = (prevScrollHeight - div.scrollTop - div.clientHeight) < 80;
                
                div.innerHTML = ''; 
                lastDate = null;
                
                if (snap.empty) { 
                    div.innerHTML = '<div style="text-align:center; color:#555; padding:60px 20px;">💬 لا توجد رسائل بعد<br><span style="font-size:0.8rem; color:#666;">كن أول من يرسل رسالة!</span></div>'; 
                    updateScrollButton();
                    return; 
                }
                
                snap.forEach(function(doc) {
                    var m = doc.data(); 
                    m.id = doc.id;
                    
                    if (m.deleted) { 
                        div.innerHTML += '<div class="msg-wrapper"><div class="msg-bubble" style="font-style:italic;color:#666;background:rgba(255,255,255,0.05);">🗑️ تم حذف الرسالة</div></div>'; 
                        return; 
                    }
                    
                    var msgTime = '';
                    if (m.timestamp) { 
                        try { 
                            var d = m.timestamp.toDate();
                            var dateStr = d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' }); 
                            if (dateStr !== lastDate) { 
                                div.innerHTML += '<div class="date-divider"><span>' + dateStr + '</span></div>'; 
                                lastDate = dateStr; 
                            }
                            msgTime = d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                        } catch(e) {} 
                    }
                    
                    var isSent = m.senderID === currentUser.uid;
                    var cls = isSent ? 'sent' : 'received';
                    var contentHtml = '';
                    
                    if (m.type === 'image') {
                        contentHtml = '<img src="' + m.content + '" onclick="viewImage(\'' + m.content + '\')" loading="lazy" style="max-width:220px; border-radius:10px; cursor:pointer; display:block;" onerror="this.style.display=\'none\'">';
                        if (m.fileName) contentHtml += '<small style="font-size:0.65rem; color:#888; display:block;">📷 ' + m.fileName + '</small>';
                    } else if (m.type === 'video') {
                        contentHtml = '<video controls src="' + m.content + '" style="max-width:220px; border-radius:10px;" preload="metadata" playsinline></video>';
                        if (m.fileName) contentHtml += '<small style="font-size:0.65rem; color:#888; display:block;">🎥 ' + m.fileName + '</small>';
                    } else if (m.type === 'audio') {
                        contentHtml = '<audio controls src="' + m.content + '" style="max-width:200px; border-radius:20px;" preload="metadata"></audio>';
                    } else if (m.type === 'file') {
                        contentHtml = '<div class="file-attachment" onclick="window.open(\'' + m.content + '\')"><span style="font-size:1.5rem;">📄</span><div><strong>' + (m.fileName || 'ملف مرفق') + '</strong><br><small style="color:var(--text2);">اضغط للتحميل</small></div></div>';
                    } else if (m.type === 'broadcast') {
                        contentHtml = '<strong style="color:var(--gold);">📢 ' + (m.content || '').replace(/\n/g, '<br>') + '</strong>';
                    } else {
                        contentHtml = (m.content || '').replace(/\n/g, '<br>');
                    }
                    
                    div.innerHTML += '<div class="msg-wrapper ' + cls + '" style="animation: messageIn 0.25s ease-out;"><div class="msg-bubble">' + contentHtml + '</div><div class="msg-meta-info">' + (!isSent ? '<strong>' + (m.senderName || 'مستخدم') + '</strong> • ' : '') + msgTime + (isSent ? ' <span class="seen-check">' + (m.seen ? '✓✓' : '✓') + '</span>' : '') + (isSent ? ' <button class="delete-msg-btn" onclick="deleteMyMessage(\'' + m.id + '\')" title="حذف">🗑️</button>' : '') + (!isSent ? ' <button class="report-btn" onclick="reportMessage(\'' + m.id + '\',\'' + m.senderID + '\',\'' + (m.senderName || '') + '\')" title="تبليغ">🚩</button>' : '') + '</div></div>';
                });
                
                // Smart scrolling
                if (!userScrolledUp || wasNearBottom) {
                    requestAnimationFrame(function() { div.scrollTop = div.scrollHeight; });
                    setTimeout(function() { div.scrollTop = div.scrollHeight; }, 50);
                    setTimeout(function() { div.scrollTop = div.scrollHeight; }, 200);
                } else {
                    var newScrollHeight = div.scrollHeight;
                    var scrollDiff = newScrollHeight - prevScrollHeight;
                    if (scrollDiff > 0) { div.scrollTop = div.scrollTop + scrollDiff; }
                    
                    if (snap.docChanges().length > 0) {
                        var newMsgs = snap.docChanges().filter(function(c) { return c.type === 'added'; })
                            .filter(function(c) { return c.doc.data().senderID !== currentUser.uid; });
                        
                        if (newMsgs.length > 0) {
                            unreadCount += newMsgs.length;
                            unreadCounts.groups[currentGroupId] = unreadCount;
                            updateAllUnreadBadges();
                            playNotificationSound();
                            sendBrowserNotification(g.name || 'مجموعة', 'لديك ' + unreadCount + ' رسالة جديدة');
                        }
                    }
                }
                
                updateScrollButton();
            }, function(error) {
                div.innerHTML = '<div style="text-align:center; color:var(--danger); padding:40px;">❌ حدث خطأ في تحميل الرسائل<br><button class="btn btn-xs btn-outline" onclick="loadMessages()" style="margin-top:10px;">🔄 إعادة المحاولة</button></div>';
            });
        
        allListeners.push(unsub); 
        chatUnsubscribe = unsub;
        setTimeout(updateScrollButton, 500);
    }

    function loadTypingIndicator() {
        if (typingUnsubscribe) typingUnsubscribe();
        var el = document.getElementById('typingStatus');
        if (!el) return;
        
        var unsub = db.collection('groups').doc(currentGroupId).collection('typing')
            .onSnapshot(function(snap) {
                var typing = [];
                snap.forEach(function(d) {
                    if (d.id !== currentUser.uid) typing.push(d.data().name || 'شخص');
                });
                el.textContent = typing.length > 0 ? '✏️ ' + typing[0] + ' يكتب...' : '';
            });
        
        allListeners.push(unsub);
        typingUnsubscribe = unsub;
    }

    // ==========================================
    // SEND MESSAGE
    // ==========================================
    window.sendMessage = function() {
        var input = document.getElementById('msgInput');
        if (!input || input.disabled) return;
        
        var text = input.value.trim();
        if (!text) return;
        
        input.value = '';
        input.disabled = true;
        
        db.collection('groups').doc(currentGroupId).collection('messages').add({
            senderID: currentUser.uid,
            senderName: currentUser.name || 'طالب',
            type: 'text',
            content: text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            seen: false
        }).then(function() {
            input.disabled = false;
            input.focus();
            db.collection('groups').doc(currentGroupId).collection('typing').doc(currentUser.uid).delete();
            db.collection('users').doc(currentUser.uid).update({
                totalMessages: firebase.firestore.FieldValue.increment(1),
                points: firebase.firestore.FieldValue.increment(1)
            }).then(function() {
                // Check for achievements
                db.collection('users').doc(currentUser.uid).get().then(function(d) {
                    var points = (d.data().points || 0) + 1;
                    if (points % 50 === 0) {
                        launchConfetti();
                        showToast('🏆 لقد وصلت إلى ' + points + ' نقطة!', 'success');
                    }
                });
            });
        }).catch(function() {
            input.disabled = false;
            input.value = text;
            input.focus();
        });
    };

    // ==========================================
    // UPLOAD MEDIA
    // ==========================================
    window.uploadMedia = function() {
        if (typeof cloudinary === 'undefined') {
            showToast('⚠️ ميزة الرفع غير متاحة حالياً', 'warning');
            return;
        }
        
        cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME,
            uploadPreset: UPLOAD_PRESET,
            sources: ['local', 'url', 'camera', 'google_drive', 'dropbox'],
            multiple: true,
            maxFiles: 5,
            maxFileSize: 30000000,
            clientAllowedFormats: ['png', 'jpg', 'jpeg', 'gif', 'webp', 'mp4', 'mov', 'mp3', 'wav', 'pdf', 'doc', 'docx'],
            cropping: true,
            showSkipCropButton: true,
            styles: {
                palette: {
                    window: "#15151F", windowBorder: "#FFC107", tabIcon: "#FFC107",
                    menuIcons: "#AAAAAA", textDark: "#FFFFFF", textLight: "#000000",
                    link: "#FFC107", action: "#FFC107", inactiveTabIcon: "#555555",
                    error: "#FF4757", inProgress: "#FFC107", complete: "#2ED573", sourceBg: "#1E1E2A"
                }
            }
        }, function(error, result) {
            if (!error && result && result.event === 'success') {
                var url = result.info.secure_url;
                var type = result.info.resource_type === 'image' ? 'image' :
                             result.info.resource_type === 'video' ? 'video' : 'file';
                
                db.collection('groups').doc(currentGroupId).collection('messages').add({
                    senderID: currentUser.uid,
                    senderName: currentUser.name || 'طالب',
                    type: type,
                    content: url,
                    fileName: result.info.original_filename || 'ملف',
                    fileSize: result.info.bytes || 0,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    seen: false
                });
            }
            if (result && result.event === 'queues-end') {
                showToast('✅ تم رفع الملفات بنجاح', 'success');
            }
            if (error) {
                console.error('Upload error:', error);
                showToast('❌ فشل الرفع', 'error');
            }
        }).open();
    };

    function handleTyping() {
        clearTimeout(typingTimeout);
        db.collection('groups').doc(currentGroupId).collection('typing').doc(currentUser.uid).set({
            name: currentUser.name || 'طالب',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        typingTimeout = setTimeout(function() {
            db.collection('groups').doc(currentGroupId).collection('typing').doc(currentUser.uid).delete();
        }, 4000);
    }

    // ==========================================
    // DELETE & REPORT MESSAGES
    // ==========================================
    window.deleteMyMessage = function(msgId) {
        if (confirm('🗑️ حذف هذه الرسالة؟')) {
            db.collection('groups').doc(currentGroupId).collection('messages').doc(msgId)
                .update({ deleted: true, deletedAt: firebase.firestore.FieldValue.serverTimestamp() })
                .then(function() { showToast('✅ تم حذف الرسالة', 'success'); })
                .catch(function() { showToast('❌ فشل الحذف', 'error'); });
        }
    };

    function showReportModal(data) {
        var modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
        <div class="modal">
            <span class="close-modal" onclick="this.closest('.modal-overlay').remove()">✕</span>
            <h3>🚨 تبليغ</h3>
            <div class="form-group">
                <label style="color:var(--text2); display:block; margin-bottom:6px;">سبب البلاغ</label>
                <textarea id="reportReason" class="input-field" style="min-height:80px; text-align:right; font-size:0.85rem; letter-spacing:0;" placeholder="اكتب سبب البلاغ..."></textarea>
            </div>
            <button class="btn btn-danger" onclick="submitReport('${data}')">🚨 إرسال البلاغ</button>
            <button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()" style="width:100%; margin-top:6px;">إلغاء</button>
        </div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });

    window.submitReport = async function(groupId) {
        var reason = document.getElementById('reportReason')?.value?.trim();
        if (!reason) return showToast('⚠️ اكتب سبب البلاغ', 'warning');
        
        try {
            await db.collection('reports').add({
                groupID: groupId,
                reporterID: currentUser.uid,
                reporterName: currentUser.name,
                reason: reason,
                status: 'pending',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.querySelector('.modal-overlay')?.remove();
            showToast('✅ تم إرسال البلاغ', 'success');
        } catch(e) {
            showToast('❌ فشل الإرسال', 'error');
        }
    };

    window.reportMessage = function(msgId, senderId, senderName) {
        if (confirm('🚩 تبليغ عن هذه الرسالة؟')) {
            db.collection('reports').add({
                messageID: msgId,
                groupID: currentGroupId,
                reportedUserID: senderId,
                reportedUserName: senderName,
                reporterID: currentUser.uid,
                reporterName: currentUser.name,
                reason: 'إساءة في الرسالة',
                status: 'pending',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(function() { showToast('✅ تم التبليغ', 'success'); })
              .catch(function() { showToast('❌ فشل التبليغ', 'error'); });
        }
    };

    // ==========================================
    // CHATS LIST (PRIVATE)
    // ==========================================
    function renderChatsList() {
        var content = document.getElementById('contentArea');
        content.innerHTML = `
        <h2 class="section-title">💬 المحادثات</h2>
        <input class="input-field" id="chatSearchInput" placeholder="🔍 بحث في المحادثات..." oninput="filterChats()" style="text-align:right; letter-spacing:0; font-size:0.85rem; margin-bottom:10px;">

        <button class="btn btn-outline btn-sm" onclick="navigate('private-chats')" style="width:100%; margin-top:8px;">➕ محادثة جديدة</button>`;
        loadAllChats();
    }

    async function loadAllChats() {
        var container = document.getElementById('chatsListContainer');
        if (!container) return;
        
        try {
            var snap = await db.collection('private_chats')
                .where('participants', 'array-contains', currentUser.uid)
                .get();
            var chats = [];
            
            for (var i = 0; i < snap.docs.length; i++) {
                var doc = snap.docs[i];
                var cd = doc.data();
                var otherId = cd.participants.find(function(p) { return p !== currentUser.uid; });
                if (otherId) {
                    var userDoc = await db.collection('users').doc(otherId).get();
                    if (userDoc.exists) {
                        chats.push({
                            id: doc.id,
                            user: userDoc.data(),
                            uid: otherId,
                            last: cd.lastMessage || '',
                            time: cd.lastMessageTime
                        });
                    }
                }
            }
            
            chats.sort(function(a, b) { return (b.time?.toDate?.()?.getTime() || 0) - (a.time?.toDate?.()?.getTime() || 0); });
            
            if (chats.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><h3>لا توجد محادثات</h3><p>ابدأ محادثة مع زملائك</p></div>';
            } else {
                container.innerHTML = chats.map(function(c) {
                    var unread = unreadCounts.privateChats[c.uid] || 0;
                    return `
                    <div class="chat-list-item" onclick="openPrivateChat('${c.uid}')">
                        <img src="${c.user.profilePic || 'https://via.placeholder.com/48'}" alt="صورة" onerror="this.src='https://via.placeholder.com/48'">
                        <div class="chat-info">
                            <div class="chat-name">${c.user.name || 'مستخدم'} ${c.user.online ? '<span class="online-dot"></span>' : ''}</div>
                            <div class="chat-lastmsg">${c.last || 'ابدأ المحادثة...'}</div>
                        </div>
                        <div class="chat-time">${formatTime(c.time)}</div>
                        ${unread > 0 ? '<div class="unread-badge">' + unread + '</div>' : ''}
                    </div>`;
                }).join('');
            }
        } catch(e) {
            container.innerHTML = '<p style="color:var(--danger); text-align:center;">❌ حدث خطأ</p>';
        }
    }

    function loadPrivateMessages(cid) {
        var c = document.getElementById('privateChatMessages');
        if (!c) return;
        
        var unsub = db.collection('private_chats').doc(cid).collection('messages')
            .orderBy('timestamp', 'asc')
            .onSnapshot(function(s) {
                var wasAtBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 80;
                
                c.innerHTML = '';
                if (s.empty) {
                    c.innerHTML = '<p style="text-align:center; color:#555; padding:50px;">💬 لا توجد رسائل</p>';
                    return;
                }
                s.forEach(function(d) {
                    var m = d.data();
                    var isSent = m.senderID === currentUser.uid;
                    c.innerHTML += `
                    <div class="msg-wrapper ${isSent ? 'sent' : 'received'}">
                        <div class="msg-bubble">${(m.content || '').replace(/\n/g, '<br>')}</div>
                        <div class="msg-meta-info">${formatTime(m.timestamp)}</div>
                    </div>`;
                });
                
                if (wasAtBottom) {
                    c.scrollTop = c.scrollHeight;
                }
            });
        
        allListeners.push(unsub);
    }

    window.sendPrivateMsg = function() {
        var i = document.getElementById('privateMsgInput');
        if (!i?.value?.trim() || !currentPrivateChatUser) return;
        
        var cid = [currentUser.uid, currentPrivateChatUser].sort().join('_');
        var cnt = i.value.trim();
        
        db.collection('private_chats').doc(cid).set({
            participants: [currentUser.uid, currentPrivateChatUser],
            lastMessage: cnt,
            lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true }).then(function() {
            return db.collection('private_chats').doc(cid).collection('messages').add({
                senderID: currentUser.uid,
                senderName: currentUser.name || 'طالب',
                content: cnt,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }).then(function() {
            i.value = '';
            i.focus();
        });
    };

    async function loadAllMedia() {
        var co = document.getElementById('mediaGrid');
        if (!co) return;
        
        try {
            var groupsSnap = await db.collection('groups').where('members', 'array-contains', currentUser.uid).get();
            var allMedia = [];
            
            for (var i = 0; i < groupsSnap.docs.length; i++) {
                var gd = groupsSnap.docs[i];
                var msgs = await db.collection('groups').doc(gd.id).collection('messages')
                    .where('type', 'in', ['image', 'video', 'file'])
                    .orderBy('timestamp', 'desc')
                    .limit(60)
                    .get();
                msgs.forEach(function(d) { allMedia.push(d.data()); });
            }
            
            if (allMedia.length === 0) {
                co.innerHTML = '<p style="color:var(--text2); text-align:center; grid-column:1/-1; padding:30px;">لا توجد وسائط</p>';
                return;
            }
            
            co.innerHTML = allMedia.map(function(m) {
                if (m.type === 'image') {
                    return '<div class="media-item" onclick="viewImage(\'' + m.content + '\')"><img src="' + m.content + '" alt="صورة" loading="lazy" onerror="this.style.display=\'none\'"><span class="media-type-badge">📷</span></div>';
                } else if (m.type === 'video') {
                    return '<div class="media-item"><video src="' + m.content + '" controls preload="metadata" playsinline></video><span class="media-type-badge">🎥</span></div>';
                } else {
                    return '<div class="media-item"><div class="file-placeholder" onclick="window.open(\'' + m.content + '\')">📄</div></div>';
                }
            }).join('');
        } catch(e) {
            co.innerHTML = '<p style="color:var(--danger); text-align:center; grid-column:1/-1;">❌ حدث خطأ</p>';
        }
    }

                    ${s.email ? '<a href="mailto:' + s.email + '" class="support-link"><img src="https://img.icons8.com/color/48/gmail.png" alt="بريد"><span>بريد</span></a>' : ''}
                </div>
                ${!s.whatsapp && !s.facebook && !s.phone && !s.email ? '<p style="color:var(--text3); margin-top:12px;">لم يتم إضافة روابط تواصل بعد</p>' : ''}
            </div>`;
        });
    }

    // ==========================================
    // IMAGE VIEWER
    // ==========================================
    window.viewImage = function(url) {
        var viewer = document.getElementById('imageViewer');
        var img = document.getElementById('viewerImage');
        if (viewer && img) {
            img.src = url;
            viewer.classList.remove('hidden');
        }
    };

    window.closeImageViewer = function(e) {
        if (e.target === document.getElementById('imageViewer') || e.target.classList.contains('close-viewer')) {
            document.getElementById('imageViewer').classList.add('hidden');
        }
    };

    // ==========================================
    // UNREAD BADGES SYSTEM
    // ==========================================
    function updateAllUnreadBadges() {
        // Groups unread
        var groupsBadge = document.getElementById('groupsUnreadBadge');
        var groupsTotal = 0;
        Object.values(unreadCounts.groups).forEach(function(v) { groupsTotal += v; });
        
        if (groupsBadge) {
            groupsBadge.textContent = groupsTotal;
            if (groupsTotal > 0) {
                groupsBadge.classList.remove('hidden');
            } else {
                groupsBadge.classList.add('hidden');
            }
        }
        
        // Chats unread
        var chatsBadge = document.getElementById('chatsUnreadBadge');
        var chatsTotal = 0;
        Object.values(unreadCounts.privateChats).forEach(function(v) { chatsTotal += v; });
        
        if (chatsBadge) {
            chatsBadge.textContent = chatsTotal;
            if (chatsTotal > 0) {
                chatsBadge.classList.remove('hidden');
            } else {
                chatsBadge.classList.add('hidden');
            }
        }
    }

    // ==========================================
    // SERVICE WORKER REGISTRATION (PWA)
    // ==========================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            // Create inline service worker
            var swCode = `
                self.addEventListener('install', function(e) {
                    self.skipWaiting();
                });
                self.addEventListener('activate', function(e) {
                    e.waitUntil(clients.claim());
                });
                self.addEventListener('fetch', function(e) {
                    e.respondWith(
                        caches.match(e.request).then(function(cached) {
                            return cached || fetch(e.request).then(function(response) {
                                var clone = response.clone();
                                caches.open('webegypt-v1').then(function(cache) {
                                    cache.put(e.request, clone);
                                });
                                return response;
                            });
                        }).catch(function() {
                            return new Response('غير متصل بالإنترنت', { status: 503 });
                        })
                    );
                });
            `;
            
            var blob = new Blob([swCode], { type: 'application/javascript' });
            var swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl).then(function() {
                console.log('✅ Service Worker Registered');
            }).catch(function(e) {
                console.log('Service Worker failed:', e);
            });
        });
    }
    
    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
        setTimeout(function() {
            Notification.requestPermission();
        }, 5000);
    }

    // ==========================================
    // INITIALIZATION
    // ==========================================
    document.addEventListener('DOMContentLoaded', function() {
        showLoading('🔍 جاري التحقق من الجلسة...');
        autoLogin().then(function(loggedIn) {
            hideLoading();
            if (!loggedIn) {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('codeInput').focus();
                
                // Pre-fill code if saved
                var savedCode = localStorage.getItem('webEgyptCode');
                if (savedCode) {
                    document.getElementById('codeInput').value = savedCode;
                }
            } else {
                document.getElementById('mainScreen').classList.remove('hidden');
                switchTab('groups');
                monitorAccountDeletion();
            }
        }).catch(function() {
            hideLoading();
            document.getElementById('loginScreen').classList.remove('hidden');
        });
        
        // Add ripple effect to buttons
        document.addEventListener('click', function(e) {
            var btn = e.target.closest('.btn');
            if (btn) {
                var ripple = document.createElement('span');
                ripple.className = 'ripple-effect';
                var rect = btn.getBoundingClientRect();
                var size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                btn.appendChild(ripple);
                setTimeout(function() { ripple.remove(); }, 600);
            }
        });
    });
