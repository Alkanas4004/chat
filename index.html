    function showToast(msg, type) {
        type = type || 'info';
        const colors = { success: '#2ED573', error: '#FF4757', info: '#FFC107', warning: '#FFA502' };
        const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.background = colors[type] || colors.info;
        toast.style.color = (type === 'info' || type === 'warning') ? '#000' : '#fff';
        toast.textContent = (icons[type] || '') + ' ' + msg;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = '0.3s'; setTimeout(() => toast.remove(), 300); }, 2500);
    }

        if (!date) return '';
        try { const d = date.toDate ? date.toDate() : new Date(date); return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }); } catch(e) { return ''; }
    }

    function formatDate(date) {
        if (!date) return '';

    }

        let deviceID = localStorage.getItem('webEgyptDeviceID');

        return deviceID;
    }

    // ========== Ripple Effect ==========
    function addRipple(e) {
        const target = e.currentTarget;
        const ripple = document.createElement('span');
        const rect = target.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        const clientX = e.clientX || (e.touches && e.touches[0].clientX) || rect.left;
        const clientY = e.clientY || (e.touches && e.touches[0].clientY) || rect.top;
        ripple.style.left = (clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (clientY - rect.top - size / 2) + 'px';
        ripple.className = 'ripple-effect';
        target.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    }

    document.addEventListener('mousedown', function(e) {
        const target = e.target.closest('.btn, .icon-btn, .icon-circle-btn, .group-card, .chat-list-item, .user-list-item');

    }, {passive: true});

        // ========== Mobile Back Button Handling ==========
    let historyStack = [];
    let isInChat = false;
    
    function pushHistory(view, id) {
        id = id || null;
        const state = { view: view, id: id };
        history.pushState(state, '', '#' + view + (id ? '-' + id : ''));
        historyStack.push(state);
        
        if (view === 'group-chat' || view === 'private-chat') {
            isInChat = true;
        } else {
            isInChat = false;

    }
        // ========== Smooth Scroll Everywhere ==========

    // 🔥🔥🔥 التعامل مع زرار الرجوع في الموبايل

        if (e.state && e.state.view) {
            // لو كان في شات وضغط رجوع

                currentGroupId = null;

                currentGroupId = null; 
                isInChat = false;

       window.studentLogin = async function() {

        errEl.textContent = '';
        
        // 🔥🔥🔥 لو مفيش كود مكتوب والجهاز متوثق - خش تلقائي
        if (!code) {
            const deviceAuth = localStorage.getItem('webEgyptDeviceAuth');
            if (deviceAuth === 'true') {
                showLoading('🔍 جاري الدخول التلقائي...');
                const loggedIn = await autoLogin();
                hideLoading();
                if (loggedIn) {
                    document.getElementById('loginScreen').classList.add('hidden');

                    startUserDeletionListener();

                    showToast('✅ أهلاً بك ' + currentUser.name + '!', 'success');

            codeInput.classList.add('shake-animation');
            setTimeout(() => codeInput.classList.remove('shake-animation'), 500);
            return;
        }
        if (code.length < 4) { errEl.textContent = '⚠️ الكود قصير جداً (4 أحرف على الأقل)'; return; }
        
        showLoading('🔍 جاري التحقق من الكود...');
        const deviceID = getDeviceID();
        
        try {

            if (codeSnap.empty) throw new Error('❌ الكود غير صحيح');
            
            const codeDoc = codeSnap.docs[0];
            const codeData = codeDoc.data();
            
            // 🔥 فحص إذا كان الكود مستخدم على جهاز آخر
            if (codeData.usedBy && codeData.usedByDevice && codeData.usedByDevice !== deviceID) {
                throw new Error('⚠️ الكود مستخدم على جهاز آخر');
            }
            
            const userId = codeData.studentNumber || codeDoc.id;
            const userRef = db.collection('users').doc(userId);
            
            // 🔥 فحص إذا كان المستخدم محظور
            const existingUser = await userRef.get();
            if (existingUser.exists && existingUser.data().banned) {
                throw new Error('🚫 حسابك محظور. تواصل مع الأدمن.');
            }
            
            // تحديث الكود إذا لم يستخدم بعد
            if (!codeData.usedBy) {
                await codeDoc.ref.update({
                    usedBy: userId,
                    usedByDevice: deviceID,
                    activatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

            // إنشاء أو تحديث المستخدم
            const userDoc = await userRef.get();
            if (!userDoc.exists) {
                await userRef.set({
                    userID: userId,
                    name: codeData.studentName || 'طالب',
                    phone: codeData.studentNumber || '',

                    chatBg: '',

                    points: 0,
                    banned: false,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } else {
                await userRef.update({
                    online: true,
                    deviceID: deviceID,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            // الانضمام التلقائي للمجموعات
            if (codeData.allowedGroups && codeData.allowedGroups.length > 0) {
                const batch = db.batch();
                codeData.allowedGroups.forEach(groupId => {
                    const gr = db.collection('groups').doc(groupId);
                    batch.update(gr, { members: firebase.firestore.FieldValue.arrayUnion(userId) });
                });
                await batch.commit();
                
                // تحديث عدد الأعضاء
                await Promise.all(codeData.allowedGroups.map(groupId =>
                    db.collection('groups').doc(groupId).get().then(gd => {
                        const members = gd.data().members || [];
                        return db.collection('groups').doc(groupId).update({ memberCount: members.length });
                    })
                ));
            }
            
            // تعيين المستخدم الحالي

                points: u.points || 0,
                banned: u.banned || false
            };
            
             // 🔥🔥🔥 حفظ الجلسة + الكود + الجهاز
            localStorage.setItem('webEgyptUserID', userId);
            localStorage.setItem('webEgyptUserCode', code);
            localStorage.setItem('webEgyptDeviceAuth', 'true');
            localStorage.setItem('webEgyptAuthTime', Date.now());
            localStorage.setItem('webEgyptDeviceAuth', 'true');  // تم التوثيق على الجهاز ده
            localStorage.setItem('webEgyptAuthTime', Date.now()); // وقت التوثيق
            
            hideLoading();
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            
            // 🎉 احتفال أول دخول
            if (!localStorage.getItem('webEgyptFirstLoginConfetti')) {
                localStorage.setItem('webEgyptFirstLoginConfetti', '1');
                setTimeout(() => confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } }), 500);
            }
            
            startUserDeletionListener();
            switchTab('groups');
            showToast('✅ أهلاً بك ' + currentUser.name + '!', 'success');
            
            // طلب إذن الإشعارات
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
            
        } catch(e) {
            hideLoading();
            errEl.textContent = e.message || 'حدث خطأ';
        }
    };

    // ========== Sound System ==========
    function playNotificationSound(type) {
        if (!notificationSoundEnabled) return;
        
        const now = Date.now();
        if (now - lastNotificationTime < NOTIFICATION_COOLDOWN) return;
        lastNotificationTime = now;
        
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            if (type === 'message') {
                // نغمة قصيرة وجميلة للرسائل
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.12, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            } else if (type === 'group') {
                // نغمة مختلفة للمجموعات
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(660, ctx.currentTime);
                osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
            }
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.25);
        } catch(e) {}
    }

    function getLastReadTimestamp(chatId, type) {
        const key = 'lastRead_' + currentUser.uid + '_' + type + '_' + chatId;

        return val ? new Date(parseInt(val)) : new Date(0);

    function setLastReadTimestamp(chatId, type, date) {
        date = date || new Date();
        const key = 'lastRead_' + currentUser.uid + '_' + type + '_' + chatId;

        updateUnreadBadges();

    async function getUnreadCount(chatId, type) {
        try {
            const lastRead = getLastReadTimestamp(chatId, type);
            const col = type === 'group' ? 
                db.collection('groups').doc(chatId).collection('messages') :
                db.collection('private_chats').doc(chatId).collection('messages');
            const snap = await col.where('timestamp', '>', lastRead)
                .where('senderID', '!=', currentUser.uid)
                .orderBy('timestamp', 'desc')
                .limit(99)
                .get();
            return snap.size;
        } catch(e) { return 0; }
    }

    async function updateUnreadBadges() {
        if (!currentUser) return;
        
        try {
            // مجموعات
            const groupsSnap = await db.collection('groups').where('members', 'array-contains', currentUser.uid).get();
            let totalGroupsUnread = 0;
            for (const doc of groupsSnap.docs) {
                const unread = await getUnreadCount(doc.id, 'group');
                unreadCounts.groups[doc.id] = unread;
                totalGroupsUnread += unread;
            }
            const groupsBadge = document.getElementById('groupsUnreadBadge');
            if (groupsBadge) {
                groupsBadge.textContent = totalGroupsUnread;
                groupsBadge.style.display = totalGroupsUnread > 0 ? 'block' : 'none';
                if (totalGroupsUnread > 0) {
                    groupsBadge.style.animation = 'none';
                    void groupsBadge.offsetWidth;
                    groupsBadge.style.animation = 'badgePop 0.3s ease';
                }
            }
            
            // محادثات خاصة
            const privateSnap = await db.collection('private_chats').where('participants', 'array-contains', currentUser.uid).get();
            let totalChatsUnread = 0;
            for (const doc of privateSnap.docs) {
                const unread = await getUnreadCount(doc.id, 'private');
                unreadCounts.privateChats[doc.id] = unread;
                totalChatsUnread += unread;
            }
            const chatsBadge = document.getElementById('chatsUnreadBadge');
            if (chatsBadge) {
                chatsBadge.textContent = totalChatsUnread;
                chatsBadge.style.display = totalChatsUnread > 0 ? 'block' : 'none';
                if (totalChatsUnread > 0) {
                    chatsBadge.style.animation = 'none';
                    void chatsBadge.offsetWidth;
                    chatsBadge.style.animation = 'badgePop 0.3s ease';
                }
            }
        } catch(e) {}
    }

                    if (perms.allowVideos === false) restrictions.push('🎥');

            const allowVideos = perms.allowVideos !== false;
            const allowFiles = perms.allowFiles !== false;

            if (!allowVideos) restrictions.push('🎥 الفيديو');
            if (!allowFiles) restrictions.push('📎 الملفات');
            if (!allowAudio) restrictions.push('🎤 الصوت');
            
            const canWrite = isAdmin || (!isLocked && (g.type === 'open' || g.type === undefined));
            const canWriteText = canWrite && allowText;
            const canUploadAnyMedia = canWrite && (allowImages || allowVideos || allowFiles || allowAudio);
            
            let html = '<div style="display:flex;flex-direction:column;height:100%;width:100%;">';

                    <span class="back-btn" onclick="history.back()">⬅️</span>

                    <div class="group-info">
                        <div class="group-name">${g.name || 'مجموعة'} ${g.isLocked ? '🔒' : ''}</div>
                        <div class="group-subtitle">

                            <span class="typing-status" id="typingStatus"></span>

                    <button class="icon-btn" onclick="navigate('group-info')" title="معلومات">ℹ️</button>
                    <button class="icon-btn" onclick="navigate('report','${currentGroupId}')" title="تبليغ">🚩</button>
                </div>`;
            
            if (isLocked && !isAdmin) {
                html += '<div class="locked-banner">🔒 المجموعة مقفولة بواسطة المشرف - لا يمكنك الكتابة</div>';
            } else if (restrictions.length > 0 && !isAdmin) {
                html += '<div class="restrictions-banner">⚠️ القيود: ' + restrictions.join(' | ') + '</div>';
            } else if (!canWrite && !isLocked) {
                html += '<div class="restrictions-banner">⚠️ المجموعة مقفولة النشر - المشرف فقط يمكنه الكتابة</div>';
            }
            
            html += `
                <div class="chat-messages-area" id="chatMessages" style="background-image:url('${currentUser.chatBg || ''}'); flex:1; min-height:0; overflow-y:auto;">
                    <button id="scrollBottomBtn" class="scroll-bottom-btn hidden" onclick="scrollToBottom()">⬇️ <span id="newMsgCount">0</span> جديد</button>
                </div>
                <div class="chat-input-bar" style="display:flex; flex-shrink:0;">`;
            
            if (canUploadAnyMedia) {
                html += '<button class="icon-circle-btn attach" onclick="uploadMedia()" title="رفع ملفات">📎</button>';
            }
            
            let placeholder = 'اكتب رسالة...';
            if (isLocked && !isAdmin) placeholder = '🔒 المجموعة مقفولة';
            else if (!canWriteText && !isLocked) placeholder = '🚫 النصوص ممنوعة';
            else if (!canWrite) placeholder = '🔐 لا يمكنك الكتابة';
            
            html += `
                <input id="msgInput" placeholder="${placeholder}" onkeydown="if(event.key==='Enter')sendMessage()" oninput="handleTyping()" autocomplete="off" ${!canWriteText ? 'disabled' : ''} style="flex:1;">
                <button class="icon-circle-btn send" onclick="sendMessage()" ${!canWriteText ? 'disabled' : ''}>➤</button>
            </div>`;
            
            html += '</div>';
            
            content.innerHTML = html;
            newMessageCounter = 0;
            
            // 🔥 إجبار الشات على الظهور
            setTimeout(function() {
                var msgArea = document.getElementById('chatMessages');
                if (msgArea) {
                    msgArea.style.cssText = 'flex:1 1 0% !important; min-height:0 !important; overflow-y:auto !important; padding:12px 14px;';
                    msgArea.scrollTop = msgArea.scrollHeight;
                }
                var inputBar = document.querySelector('.chat-input-bar');
                if (inputBar) {
                    inputBar.style.cssText = 'display:flex !important; visibility:visible !important; flex-shrink:0; padding:10px 12px; padding-bottom:15px; background:var(--surface); border-top:1px solid #1a1a25; gap:8px; z-index:10;';
                }
            }, 200);
            
            loadMessages();
            loadTypingIndicator();
        }).catch(e => {
            console.error('Chat render error:', e);
            content.innerHTML = '<div class="empty-state"><div class="icon">❌</div><h3>حدث خطأ</h3><p>يرجى المحاولة مرة أخرى</p><button class="btn btn-outline btn-sm" onclick="switchTab(\'groups\')">⬅️ رجوع</button></div>';
        });

        function loadMessages() {
        const div = document.getElementById('chatMessages'); 
        if (!div) return; 
        if (chatUnsubscribe) { chatUnsubscribe(); chatUnsubscribe = null; }
        
        let lastDate = null;
        let shouldAutoScroll = true;
        let newMsgCount = 0;
        
        const scrollBtn = document.getElementById('scrollBottomBtn');
        const newMsgSpan = document.getElementById('newMsgCount');
        
        // 🔥🔥🔥 تتبع المستخدم بالكامل عشان نعرف هو فين
        div.addEventListener('touchstart', function() {
            shouldAutoScroll = false;
        }, { passive: true });
        
        div.addEventListener('touchend', function() {
            setTimeout(function() {
                const bottom = div.scrollHeight - div.scrollTop - div.clientHeight;
                if (bottom < 80) {
                    shouldAutoScroll = true;
                    if (scrollBtn) scrollBtn.classList.add('hidden');
                    newMsgCount = 0;
                    setLastReadTimestamp(currentGroupId, 'group');
                }
            }, 1000);
        }, { passive: true });
        
        div.addEventListener('scroll', function() {
            const bottom = div.scrollHeight - div.scrollTop - div.clientHeight;
            if (bottom < 60) {
                shouldAutoScroll = true;
                newMsgCount = 0;
                if (scrollBtn) scrollBtn.classList.add('hidden');
                setLastReadTimestamp(currentGroupId, 'group');
            } else if (bottom > 200) {
                shouldAutoScroll = false;
            }
        }, { passive: true });
        
        // 🔥🔥🔥 الـ listener الأساسي للرسائل
        chatUnsubscribe = db.collection('groups').doc(currentGroupId).collection('messages')
            .orderBy('timestamp', 'asc')
            .onSnapshot(function(snap) {
                const wasAtBottom = div.scrollHeight - div.scrollTop - div.clientHeight < 80;
                
                // كشف الرسائل الجديدة
                const newMessages = snap.docChanges().filter(function(change) {
                    return change.type === 'added' && 
                           change.doc.data().senderID !== currentUser.uid &&
                           change.doc.data().timestamp;
                });
                
                // لو في رسائل جديدة والمستخدم مش في الآخر
                if (newMessages.length > 0 && !shouldAutoScroll && !document.hidden) {
                    newMsgCount += newMessages.length;
                    if (scrollBtn && newMsgSpan) {
                        newMsgSpan.textContent = newMsgCount;
                        scrollBtn.classList.remove('hidden');
                    }
                }
                
              // 🔊 صوت للرسائل الجديدة
                if (newMessages.length > 0 && !document.hidden) {
                    playReceiveSound();
                }
                
                // إشعارات المتصفح
                if (newMessages.length > 0 && document.hidden) {
                    const lastMsg = newMessages[newMessages.length - 1].doc.data();
                    showBrowserNotification(
                        '📢 ' + (currentGroupData?.name || 'مجموعة'),
                        (lastMsg.senderName || 'شخص') + ': ' + (lastMsg.content || 'رسالة جديدة').substring(0, 60)
                    );
                }
                
                div.innerHTML = ''; 
                lastDate = null;
                
                if (snap.empty) { 
                    div.innerHTML = '<div style="text-align:center; color:#555; padding:50px;">💬 لا توجد رسائل<br><span style="font-size:0.8rem;">كن أول من يرسل رسالة!</span></div>'; 
                    return; 
                }
                
                snap.forEach(function(doc) {
                    const m = doc.data(); 
                    m.id = doc.id;
                    
                    if (m.deleted) { 
                        div.innerHTML += '<div class="msg-wrapper"><div class="msg-bubble" style="font-style:italic;color:#666;background:rgba(0,0,0,0.3);">🗑️ تم حذف الرسالة</div></div>'; 
                        return; 
                    }
                    
                    let msgTime = '';
                    if (m.timestamp) { 
                        try { 
                            const d = m.timestamp.toDate();
                            const dateStr = d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' }); 
                            if (dateStr !== lastDate) { 
                                div.innerHTML += '<div class="date-divider"><span>' + dateStr + '</span></div>'; 
                                lastDate = dateStr; 
                            }
                            msgTime = d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                        } catch(e) {} 
                    }
                    
                    const isSent = m.senderID === currentUser.uid;
                    const cls = isSent ? 'sent' : 'received';
                    let contentHtml = '';
                    
                    if (m.type === 'image') {
                        contentHtml = '<img src="' + m.content + '" onclick="viewImage(\'' + m.content + '\')" loading="lazy" style="max-width:220px; border-radius:10px; cursor:pointer;" onerror="this.style.display=\'none\'">';
                        if (m.fileName) contentHtml += '<small style="font-size:0.65rem; color:#888; display:block;">📷 ' + m.fileName + '</small>';
                    } else if (m.type === 'video') {
                        contentHtml = '<video controls src="' + m.content + '" style="max-width:220px; border-radius:10px;" preload="metadata" playsinline></video>';
                        if (m.fileName) contentHtml += '<small style="font-size:0.65rem; color:#888; display:block;">🎥 ' + m.fileName + '</small>';
                    } else if (m.type === 'audio') {
                        contentHtml = '<audio controls src="' + m.content + '" style="max-width:200px; border-radius:20px;" preload="metadata"></audio>';
                    } else if (m.type === 'file') {
                        contentHtml = '<div class="file-attachment" onclick="window.open(\'' + m.content + '\')"><span style="font-size:1.5rem;">📄</span><div><strong>' + (m.fileName || 'ملف مرفق') + '</strong><br><small style="color:var(--text2);">اضغط للتحميل</small></div></div>';
                    } else if (m.type === 'broadcast') {
                        contentHtml = '<strong style="color:var(--gold);">📢 ' + (m.content || '').replace(/\n/g, '<br>') + '</strong>';
                    } else {
                        contentHtml = (m.content || '').replace(/\n/g, '<br>');
                    }
                    
                    div.innerHTML += '<div class="msg-wrapper ' + cls + '"><div class="msg-bubble">' + contentHtml + '</div><div class="msg-meta-info">' + (!isSent ? '<strong>' + (m.senderName || 'مستخدم') + '</strong> • ' : '') + msgTime + (isSent ? ' <span class="seen-check">' + (m.seen ? '✓✓' : '✓') + '</span>' : '') + (isSent ? ' <button class="delete-msg-btn" onclick="deleteMyMessage(\'' + m.id + '\')" title="حذف">🗑️</button>' : '') + (!isSent ? ' <button class="report-btn" onclick="reportMessage(\'' + m.id + '\',\'' + m.senderID + '\',\'' + (m.senderName || '') + '\')" title="تبليغ">🚩</button>' : '') + '</div></div>';
                });
                
                // 🔥🔥🔥 النزول لآخر رسالة (زي الواتساب بالظبط)
                if (shouldAutoScroll || wasAtBottom) {
                    requestAnimationFrame(function() {
                        div.scrollTop = div.scrollHeight;
                    });
                    setTimeout(function() {
                        div.scrollTop = div.scrollHeight;
                    }, 50);
                    setTimeout(function() {
                        div.scrollTop = div.scrollHeight;
                    }, 150);
                }
                
                if (!shouldAutoScroll && newMsgCount > 0 && scrollBtn) {
                    scrollBtn.classList.remove('hidden');
                }
            });
        
        allListeners.push(chatUnsubscribe);
    }

            setLastReadTimestamp(currentGroupId, 'group');
        }

        const input = document.getElementById('msgInput');

    function handleTyping() {

    // ========== Upload Media ==========
    window.uploadMedia = function() {
        if (typeof cloudinary === 'undefined') {
            showToast('⚠️ ميزة الرفع غير متاحة حالياً', 'warning');
            return;
        }
        
        cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME,
            uploadPreset: UPLOAD_PRESET,
            sources: ['local', 'url', 'camera', 'google_drive', 'dropbox'],
            multiple: true,
            maxFiles: 5,
            maxFileSize: 30000000,
            clientAllowedFormats: ['png', 'jpg', 'jpeg', 'gif', 'webp', 'mp4', 'mov', 'mp3', 'wav', 'pdf', 'doc', 'docx'],
            cropping: true,
            showSkipCropButton: true,
            styles: {
                palette: {
                    window: "#15151F",
                    windowBorder: "#FFC107",
                    tabIcon: "#FFC107",
                    menuIcons: "#AAAAAA",
                    textDark: "#FFFFFF",
                    textLight: "#000000",
                    link: "#FFC107",
                    action: "#FFC107",
                    inactiveTabIcon: "#555555",
                    error: "#FF4757",
                    inProgress: "#FFC107",
                    complete: "#2ED573",
                    sourceBg: "#1E1E2A"
                }
            }
        }, (error, result) => {
            if (!error && result && result.event === 'success') {
                const url = result.info.secure_url;
                const type = result.info.resource_type === 'image' ? 'image' :
                             result.info.resource_type === 'video' ? 'video' : 'file';
                
                db.collection('groups').doc(currentGroupId).collection('messages').add({
                    senderID: currentUser.uid,
                    senderName: currentUser.name || 'طالب',
                    type: type,
                    content: url,
                    fileName: result.info.original_filename || 'ملف',
                    fileSize: result.info.bytes || 0,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    seen: false
                });
            }
            if (result && result.event === 'queues-end') {
                showToast('✅ تم رفع الملفات بنجاح', 'success');
            }
            if (error) {
                console.error('Upload error:', error);
                showToast('❌ فشل الرفع', 'error');
            }
        }).open();
    };

        try {

                reporterID: currentUser.uid,
                reporterName: currentUser.name,
                reason: reason,
                status: 'pending',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()

            document.querySelector('.modal-overlay')?.remove();

    async function loadAllChats() {
        const container = document.getElementById('chatsListContainer');
        if (!container) return;
        
        try {
            const snap = await db.collection('private_chats').where('participants', 'array-contains', currentUser.uid).get();
            const chats = [];
            
            for (const doc of snap.docs) {
                const cd = doc.data();
                const otherId = cd.participants.find(p => p !== currentUser.uid);
                if (otherId) {
                    const userDoc = await db.collection('users').doc(otherId).get();
                    if (userDoc.exists && !userDoc.data().banned) {
                        const unread = unreadCounts.privateChats[doc.id] || 0;
                        chats.push({
                            id: doc.id,
                            user: userDoc.data(),
                            uid: otherId,
                            last: cd.lastMessage || '',
                            time: cd.lastMessageTime,
                            unread: unread
                        });
                    }
                }
            }
            
            chats.sort((a, b) => (b.time?.toDate?.()?.getTime() || 0) - (a.time?.toDate?.()?.getTime() || 0));
            
            if (chats.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><h3>لا توجد محادثات</h3><p>ابدأ محادثة مع زملائك</p></div>';
            } else {
                container.innerHTML = chats.map(c => `
                <div class="chat-list-item" onclick="openPrivateChat('${c.uid}')">
                    <img src="${c.user.profilePic || 'https://via.placeholder.com/48'}" alt="صورة" onerror="this.src='https://via.placeholder.com/48'">
                    <div class="chat-info">
                        <div class="chat-name">${c.user.name || 'مستخدم'} ${c.user.online ? '<span class="online-dot"></span>' : ''}</div>
                        <div class="chat-lastmsg">${c.last || 'ابدأ المحادثة...'}</div>
                    </div>
                    <div class="chat-time">${formatTime(c.time)}</div>
                    ${c.unread > 0 ? '<span class="unread-badge">' + c.unread + '</span>' : ''}
                </div>`).join('');
            }
        } catch(e) {
            container.innerHTML = '<p style="color:var(--danger); text-align:center;">❌ حدث خطأ</p>';
        }
    }

    function loadPrivateMessages(cid) {
        const c = document.getElementById('privateChatMessages');
        if (!c) return;
        if (privateChatUnsub) privateChatUnsub();
        
        privateChatUnsub = db.collection('private_chats').doc(cid).collection('messages')
            .orderBy('timestamp', 'asc')
            .onSnapshot(s => {
                c.innerHTML = '';
                if (s.empty) {
                    c.innerHTML = '<p style="text-align:center; color:#555; padding:50px;">💬 لا توجد رسائل</p>';
                    return;
                }
                
                // 🔥 كشف رسائل جديدة للمحادثات الخاصة
                const newMsgs = s.docChanges().filter(ch => ch.type === 'added' && ch.doc.data().senderID !== currentUser.uid);
                if (newMsgs.length > 0 && !document.hidden) {
                    playNotificationSound('message');
                }
                
                s.forEach(d => {
                    const m = d.data();
                    const isSent = m.senderID === currentUser.uid;
                    c.innerHTML += `
                    <div class="msg-wrapper ${isSent ? 'sent' : 'received'}">
                        <div class="msg-bubble">${(m.content || '').replace(/\n/g, '<br>')}</div>
                        <div class="msg-meta-info">${formatTime(m.timestamp)}</div>
                    </div>`;
                });
                c.scrollTop = c.scrollHeight;
            });
        
        allListeners.push(privateChatUnsub);
    }

    window.sendPrivateMsg = function() {
        const i = document.getElementById('privateMsgInput');
        if (!i?.value?.trim() || !currentPrivateChatUser) return;
        
        const cid = [currentUser.uid, currentPrivateChatUser].sort().join('_');
        const cnt = i.value.trim();
        
        db.collection('private_chats').doc(cid).set({
            participants: [currentUser.uid, currentPrivateChatUser],
            lastMessage: cnt,
            lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true }).then(() => {
            return db.collection('private_chats').doc(cid).collection('messages').add({
                senderID: currentUser.uid,
                senderName: currentUser.name || 'طالب',
                content: cnt,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }).then(() => {
            i.value = '';
            i.focus();
        });
    };

       function renderMediaPage() {
        const c = document.getElementById('contentArea');
        c.innerHTML = `
        <h2 class="section-title">📁 الوسائط المشتركة</h2>
        <div style="display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;">

    let allMediaCache = [];
    let currentMediaFilter = 'all';

        async function loadAllMedia() {
        const co = document.getElementById('mediaGrid');
        if (!co) return;
        
        co.innerHTML = '<p style="color:var(--text2); grid-column:1/-1; text-align:center;">⏳ جاري تحميل الوسائط...</p>';
        
        try {
            const groupsSnap = await db.collection('groups').where('members', 'array-contains', currentUser.uid).get();
            
            if (groupsSnap.empty) {
                co.innerHTML = '<p style="color:var(--text3); text-align:center; grid-column:1/-1; padding:30px;">لا توجد مجموعات</p>';
                return;
            }
            
            allMediaCache = [];
            
            // 🔥🔥🔥 جيب كل الوسائط من كل المجموعات
            for (const gd of groupsSnap.docs) {
                const msgs = await db.collection('groups').doc(gd.id).collection('messages')
                    .where('type', 'in', ['image', 'video', 'file'])
                    .orderBy('timestamp', 'desc')
                    .limit(100)
                    .get();
                
                msgs.forEach(function(d) {
                    const m = d.data();
                    if (!m.deleted) {
                        m.groupId = gd.id;
                        m.groupName = gd.data().name || 'مجموعة';
                        allMediaCache.push(m);
                    }
                });
            }
            
            // ترتيب حسب الوقت - الأحدث أولاً
            allMediaCache.sort(function(a, b) {
                return (b.timestamp?.toDate?.()?.getTime() || 0) - (a.timestamp?.toDate?.()?.getTime() || 0);
            });
            
            renderMediaGrid();
            
        } catch(e) {
            console.error('Media load error:', e);
            co.innerHTML = '<p style="color:var(--danger); text-align:center; grid-column:1/-1;">❌ حدث خطأ: ' + e.message + '</p>';
        }
    }

        function renderMediaGrid() {
        const co = document.getElementById('mediaGrid');
        if (!co) return;
        
        let items = allMediaCache;
        if (currentMediaFilter !== 'all') {
            items = items.filter(function(m) { return m.type === currentMediaFilter; });
        }
        
        if (items.length === 0) {
            co.innerHTML = '<p style="color:var(--text3); text-align:center; grid-column:1/-1; padding:30px;">لا توجد وسائط</p>';
            return;
        }
        
        co.innerHTML = items.map(function(m) {
            if (m.type === 'image') {
                return '<div class="media-item" onclick="viewImage(\'' + m.content + '\')"><img src="' + m.content + '" alt="صورة" loading="lazy" onerror="this.style.display=\'none\'"><span class="media-type-badge">📷</span></div>';
            } else if (m.type === 'video') {
                return '<div class="media-item"><video src="' + m.content + '" controls preload="metadata" playsinline style="width:100%;height:100%;object-fit:cover;"></video><span class="media-type-badge">🎥</span></div>';
            } else {
                return '<div class="media-item"><div class="file-placeholder" onclick="window.open(\'' + m.content + '\')"><span style="font-size:2rem;">📄</span><br><small style="font-size:0.6rem;">' + (m.fileName || 'ملف').substring(0, 12) + '</small></div></div>';
            }
        }).join('');
    }

        window.filterMedia = function(type) {
        currentMediaFilter = type;
        
        ['all', 'image', 'video', 'file'].forEach(function(t) {
            const btn = document.getElementById('mediaFilter' + t.charAt(0).toUpperCase() + t.slice(1));
            if (btn) {
                btn.style.background = t === type ? 'var(--gold)' : 'transparent';
                btn.style.color = t === type ? '#000' : 'var(--gold)';
            }
        });
        
        renderMediaGrid();
    };

        }

    // ========== Pull to Refresh ==========
    let pullStartY = 0;
    let pulling = false;
    
    document.addEventListener('touchstart', e => {
        pullStartY = e.touches[0].clientY;
        pulling = false;
    }, { passive: true });
    
    document.addEventListener('touchmove', e => {
        const content = document.getElementById('contentArea');
        if (!content || content.scrollTop > 10) return;
        
        const pull = e.touches[0].clientY - pullStartY;
        if (pull > 60 && !pulling) {
            pulling = true;
            // اهتزاز خفيف للتأكيد
            if (navigator.vibrate) navigator.vibrate(10);
            
            // تحديث المحتوى حسب التبويب الحالي
            if (currentGroupId) {
                // في شات - لا شيء
            } else if (currentTab === 'groups') {
                renderGroups();
            } else if (currentTab === 'chats') {
                renderChatsList();
            } else if (currentTab === 'stats') {
                renderStudentStats();
            }
            
            setTimeout(() => { pulling = false; }, 1000);
        }
    }, { passive: true });

    // ========== Keyboard Shortcuts ==========
    document.addEventListener('keydown', function(e) {
        // Escape للخروج من المشاهدات
        if (e.key === 'Escape') {
            const viewer = document.getElementById('imageViewer');
            if (viewer && !viewer.classList.contains('hidden')) {
                viewer.classList.add('hidden');
                document.body.style.overflow = '';
            }
            document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
        }
        
        // Ctrl+Enter للإرسال السريع
        if (e.ctrlKey && e.key === 'Enter') {
            if (currentGroupId) sendMessage();
            else if (currentPrivateChatUser) sendPrivateMsg();
        }
    });

        document.addEventListener('DOMContentLoaded', () => {

                    document.getElementById('codeInput').focus();

    window.addEventListener('online', () => {

    document.addEventListener('visibilitychange', () => {
        if (!currentUser) return;
        
        if (document.hidden) {
            // المستخدم خارج التطبيق - تحديث آخر ظهور
            db.collection('users').doc(currentUser.uid).update({ 
                online: false,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(() => {});
        } else {
            // المستخدم عاد للتطبيق
            db.collection('users').doc(currentUser.uid).update({ online: true }).catch(() => {});
            updateUnreadBadges();
        }
    });
        // ========== Sound System ==========
    var notificationSound = true;
    
    function playSendSound() {
        if (!notificationSound) return;
        try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.setValueAtTime(800, ctx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.15);
        } catch(e) {}
    }
    
    function playReceiveSound() {
        if (!notificationSound) return;
        try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }
    
    function playNotificationSound() {
        if (!notificationSound) return;
        try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var osc1 = ctx.createOscillator();
            var osc2 = ctx.createOscillator();
            var gain = ctx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(660, ctx.currentTime);
            osc1.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
            osc2.frequency.setValueAtTime(1100, ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.12, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(ctx.destination);
            osc1.start(ctx.currentTime);
            osc2.start(ctx.currentTime + 0.1);
            osc1.stop(ctx.currentTime + 0.4);
            osc2.stop(ctx.currentTime + 0.4);
        } catch(e) {}
    }
