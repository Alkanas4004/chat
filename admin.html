<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --gold: #FFC107; --gold-dark: #B8860B; --gold-light: #FFD54F;
            --gold-gradient: linear-gradient(135deg, #FFC107, #B8860B, #FFD54F);
            --bg: #0A0A0F; --surface: #15151F; --surface2: #1E1E2A;
            --surface3: #252532; --surface4: #2A2A3A;
            --text: #FFFFFF; --text2: #AAAAAA; --text3: #777777;
            --danger: #FF4757; --danger-light: #FF6B81;
            --success: #2ED573; --success-light: #7BED9F;
            --info: #1E90FF; --info-light: #70A1FF;
            --warning: #FFA502; --warning-light: #FFBE76;
            --online: #2ED573; --offline: #FF4757;
            --sidebar-width: 280px; --radius: 20px;
            --radius-sm: 12px; --radius-lg: 30px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 6px 18px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 30px rgba(0,0,0,0.5);
            --shadow-gold: 0 0 30px rgba(255,193,7,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            direction: rtl; overscroll-behavior: none;
            height: 100dvh; display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(255,193,7,0.05) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(255,193,7,0.03) 0%, transparent 50%);
        }
        #app { width: 100%; max-width: 100%; height: 100dvh; background: var(--bg); display: flex; position: relative; overflow: hidden; }
        @media (min-width: 1024px) { #app { max-width: 1300px; height: 95dvh; border-radius: 30px; margin: 20px; box-shadow: 0 0 60px rgba(255,193,7,0.15); } }
        
        @keyframes fadeInUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes scaleIn { from { transform:scale(0.8); opacity:0; } to { transform:scale(1); opacity:1; } }
        @keyframes slideUp { from { transform:translateY(100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.05);} 100%{transform:scale(1);} }
        @keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
        @keyframes gradientShift { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }
        @keyframes popIn { 0%{transform:scale(0); opacity:0;} 80%{transform:scale(1.1);} 100%{transform:scale(1); opacity:1;} }
        
        .fade-in { animation: fadeInUp 0.5s ease-out; }
        .scale-in { animation: scaleIn 0.4s ease-out; }
        .pulse-animation { animation: pulse 2s ease-in-out infinite; }
        .gradient-animation { background-size: 200% 200%; animation: gradientShift 3s ease infinite; }
        .shake-animation { animation: shake 0.5s ease-in-out; }
        .pop-in { animation: popIn 0.4s ease-out; }
        .progress-bar { height: 4px; background: linear-gradient(90deg, var(--gold), var(--gold-dark), var(--gold-light)); background-size: 200% 100%; animation: shimmer 2s linear infinite; border-radius: 2px; }

        .login-screen { position: absolute; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; }
        .login-box { background: var(--surface); border-radius: var(--radius-lg); padding: 50px 40px; width: 450px; max-width: 90%; text-align: center; box-shadow: var(--shadow-gold), var(--shadow-lg); border: 1px solid rgba(255,193,7,0.1); position: relative; overflow: hidden; }
        .login-box::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, rgba(255,193,7,0.1), transparent, rgba(255,193,7,0.1), transparent); animation: spin 10s linear infinite; z-index: 0; }
        .login-box > * { position: relative; z-index: 1; }
        .login-box h2 { color: var(--gold); font-size: 2.8rem; margin-bottom: 10px; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .login-subtitle { color: var(--text2); font-size: 1rem; margin-bottom: 30px; }
        .input-field { width: 100%; padding: 16px 20px; border-radius: 15px; border: 1px solid #333; background: var(--surface2); color: #fff; font-size: 1rem; margin: 12px 0; outline: none; transition: var(--transition); }
        .input-field:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,193,7,0.3); transform: translateY(-2px); }
        .btn { display: inline-block; padding: 16px 32px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: var(--transition); background: var(--gold-gradient); color: #000; margin: 8px; font-size: 1rem; box-shadow: 0 4px 15px rgba(255,193,7,0.3); background-size: 200% 200%; animation: gradientShift 3s ease infinite; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,193,7,0.4); }
        .btn:active { transform: scale(0.96); }
        .btn-danger { background: linear-gradient(135deg, #FF4757, #FF6B81); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #2ED573, #7BED9F); color: #000; }
        .btn-info { background: linear-gradient(135deg, #1E90FF, #70A1FF); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #FFA502, #FFBE76); color: #000; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); box-shadow: none; }
        .btn-sm { padding: 10px 22px; font-size: 0.85rem; }
        .btn-xs { padding: 6px 14px; font-size: 0.75rem; }
        .error-text { color: var(--danger); margin-top: 15px; font-weight: bold; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(255,193,7,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 15px auto; display: none; }

        .app-layout { display: flex; width: 100%; height: 100%; }
        .sidebar { width: var(--sidebar-width); background: var(--surface); height: 100%; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 100; flex-shrink: 0; border-left: 1px solid #222; background-image: linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%); }
        .sidebar-header { text-align: center; padding: 30px 20px; border-bottom: 1px solid #222; }
        .sidebar-header .admin-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 12px; object-fit: cover; box-shadow: 0 0 20px rgba(255,193,7,0.3); }
        .sidebar-header h2 { color: var(--gold); font-size: 1.6rem; }
        .nav-links { flex: 1; overflow-y: auto; padding: 10px 0; }
        .nav-item { display: flex; align-items: center; padding: 14px 25px; color: var(--text2); cursor: pointer; margin: 3px 12px; border-radius: 14px; transition: var(--transition); font-size: 0.95rem; gap: 12px; position: relative; overflow: hidden; }
        .nav-item::before { content: ''; position: absolute; inset: 0; background: var(--gold); opacity: 0; transition: var(--transition); border-radius: 14px; z-index: 0; }
        .nav-item:hover::before, .nav-item.active::before { opacity: 1; }
        .nav-item:hover, .nav-item.active { color: #000; font-weight: bold; transform: translateX(-5px); }
        .nav-item .icon { font-size: 1.4rem; z-index: 1; position: relative; }
        .nav-item .label { z-index: 1; position: relative; }
        .nav-item .badge-count { background: var(--danger); color: #fff; border-radius: 12px; padding: 2px 10px; font-size: 0.7rem; z-index: 1; margin-right: auto; }
        .sidebar-footer { padding: 15px 20px; border-top: 1px solid #222; text-align: center; }
        .logout-btn { background: rgba(255,71,87,0.1); border: 1px solid var(--danger); color: var(--danger); padding: 10px 24px; border-radius: 25px; cursor: pointer; transition: var(--transition); width: 100%; font-weight: bold; }
        .logout-btn:hover { background: var(--danger); color: #fff; }
        .main-content { flex: 1; overflow-y: auto; padding: 30px; animation: fadeIn 0.5s; }
        .page-header { margin-bottom: 30px; border-bottom: 2px solid #222; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .page-header h1 { color: var(--gold); font-size: 2.2rem; }
        .card { background: var(--surface); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .stat-card { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, var(--surface), var(--surface2)); }
        .stat-value { font-size: 3rem; font-weight: bold; color: var(--gold); }
        .stat-label { color: var(--text2); font-size: 0.9rem; margin-top: 5px; }
        .stat-change { font-size: 0.8rem; margin-top: 5px; }
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .table-responsive { overflow-x: auto; border-radius: var(--radius); }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 14px 18px; text-align: right; border-bottom: 1px solid #2a2a35; }
        .data-table th { background: var(--surface3); color: var(--gold); font-weight: bold; position: sticky; top: 0; z-index: 1; }
        .data-table tbody tr:hover { background: rgba(255,193,7,0.05); }
        .badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 0.78rem; font-weight: bold; }
        .badge-admin { background: linear-gradient(135deg, #FFC107, #B8860B); color: #000; }
        .badge-user { background: #3a3a4a; color: #fff; }
        .badge-open { background: var(--success); color: #000; }
        .badge-locked { background: var(--danger); color: #fff; }
        .badge-pending { background: var(--warning); color: #000; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px 18px; background: var(--surface2); border: 1px solid #333; border-radius: 14px; color: #fff; font-size: 0.95rem; transition: var(--transition); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255,193,7,0.2); outline: none; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row > * { flex: 1; min-width: 200px; }
        .toggle-switch { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
        .toggle-switch input[type="checkbox"] { width: 50px; height: 26px; appearance: none; background: #333; border-radius: 13px; position: relative; cursor: pointer; transition: var(--transition); }
        .toggle-switch input[type="checkbox"]:checked { background: var(--gold); }
        .toggle-switch input[type="checkbox"]::before { content: ''; width: 22px; height: 22px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: var(--transition); }
        .toggle-switch input[type="checkbox"]:checked::before { left: 26px; }
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); background: var(--surface); border-radius: var(--radius); overflow: hidden; }
        .chat-header { padding: 18px; background: var(--surface2); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #111; }
        .message { margin-bottom: 14px; }
        .bubble { display: inline-block; max-width: 75%; padding: 12px 18px; border-radius: 20px; background: var(--surface2); color: #fff; word-break: break-word; }
        .sent { text-align: right; }
        .sent .bubble { background: var(--gold-gradient); color: #000; }
        .chat-input-area { display: flex; padding: 14px; background: var(--surface2); gap: 12px; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; background: var(--surface3); color: #fff; }
        .circle-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--gold-gradient); border: none; color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); font-size: 1.3rem; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.3s; backdrop-filter: blur(5px); }
        .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 30px; width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: scaleIn 0.4s ease-out; }
        .modal h2 { color: var(--gold); margin-bottom: 20px; }
        .menu-toggle { display: none; position: fixed; top: 20px; right: 20px; z-index: 150; background: var(--gold); border: none; font-size: 2rem; padding: 10px 18px; border-radius: 14px; cursor: pointer; box-shadow: var(--shadow); }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state .icon { font-size: 5rem; margin-bottom: 15px; }
        .empty-state h3 { color: var(--text2); font-size: 1.3rem; margin-bottom: 10px; }
        .empty-state p { color: var(--text3); margin-bottom: 20px; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; right: 0; bottom: 0; transform: translateX(100%); width: 85%; z-index: 200; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-right: 0; padding: 20px; }
            .menu-toggle { display: block; }
            .chat-container { height: calc(100vh - 150px); }
            .page-header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div id="app">
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 لوحة التحكم</h2>
            <p class="login-subtitle">Web Egypt - نظام الإدارة المتكامل</p>
            <div class="input-icon"><span class="icon">📧</span><input type="email" id="adminEmail" class="input-field" placeholder="البريد الإلكتروني" dir="ltr" autocomplete="email"></div>
            <div class="input-icon"><span class="icon">🔒</span><input type="password" id="adminPassword" class="input-field" placeholder="كلمة المرور" dir="ltr" autocomplete="current-password"></div>
            <button class="btn ripple" onclick="adminLogin()" style="width:100%; margin-top:20px;">🚀 تسجيل الدخول</button>
            <div id="loginSpinner" class="spinner"></div>
            <p id="loginError" class="error-text"></p>
            <p style="color:var(--text3); font-size:0.7rem; margin-top:20px;">© 2026 Web Egypt - جميع الحقوق محفوظة</p>
        </div>
    </div>

    <div id="appLayout" class="app-layout" style="display:none;">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="https://via.placeholder.com/80" class="admin-avatar" id="adminAvatar">

                <span class="role-badge"><span class="status-dot"></span> مدير النظام</span>
            </div>
            <div class="nav-links">
                <div class="nav-item active" onclick="switchPage('dashboard')"><span class="icon">📊</span><span class="label">الإحصائيات</span></div>
                <div class="nav-item" onclick="switchPage('users')"><span class="icon">👥</span><span class="label">المستخدمين</span><span class="badge-count" id="userCountBadge">0</span></div>
                <div class="nav-item" onclick="switchPage('groups')"><span class="icon">📋</span><span class="label">المجموعات</span><span class="badge-count" id="groupCountBadge">0</span></div>
                <div class="nav-item" onclick="switchPage('create-group')"><span class="icon">➕</span><span class="label">إنشاء مجموعة</span></div>
                <div class="nav-item" onclick="switchPage('codes')"><span class="icon">🔑</span><span class="label">أكواد الطلاب</span></div>
                <div class="nav-item" onclick="switchPage('chats-list')"><span class="icon">💬</span><span class="label">المحادثات</span></div>
                <div class="nav-item" onclick="switchPage('stories')"><span class="icon">📖</span><span class="label">القصص</span></div>
                <div class="nav-item" onclick="switchPage('media')"><span class="icon">📁</span><span class="label">الوسائط</span></div>
                <div class="nav-item" onclick="switchPage('reports')"><span class="icon">🚨</span><span class="label">البلاغات</span><span class="badge-count" id="reportCountBadge">0</span></div>
                <div class="nav-item" onclick="switchPage('analytics')"><span class="icon">📈</span><span class="label">تحليلات</span></div>
                <div class="nav-item" onclick="switchPage('backup')"><span class="icon">💾</span><span class="label">النسخ الاحتياطي</span></div>
                <div class="nav-item" onclick="switchPage('settings')"><span class="icon">⚙️</span><span class="label">الإعدادات</span></div>
            </div>
            <div class="sidebar-footer">
                <div class="user-info"><img src="https://via.placeholder.com/40" id="adminAvatarSmall"><div><strong style="color:var(--gold);" id="adminNameSmall">أدمن</strong><br><small style="color:var(--text2);">مشرف عام</small></div></div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل الخروج</button>
            </div>
        </div>
        <div class="main-content" id="mainContent"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAvMxzDf2nZ7l26Cl-xunqe6Dcghi_aCCY",
        authDomain: "schoolchatapp-2c5b7.firebaseapp.com",
        projectId: "schoolchatapp-2c5b7",
        storageBucket: "schoolchatapp-2c5b7.appspot.com",
        messagingSenderId: "979995006662",
        appId: "1:979995006662:web:eb08f33a68f41cc283e9c7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    const CLOUD_NAME = "dlcjb79w0";
    const UPLOAD_PRESET = "school_preset";
    
    let currentAdmin = null;
    let currentPage = 'dashboard';
    let chatUnsub = null;
    let currentChatGroupId = null;
    let currentPrivateChatUser = null;
    let privateChatUnsub = null;
    let realtimeListeners = [];

    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
    
    function showToast(message, type) {
        type = type || 'info';
        const colors = { success: '#2ED573', error: '#FF4757', info: '#FFC107', warning: '#FFA502' };
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:' + (colors[type] || colors.info) + '; color:' + (type === 'info' || type === 'warning' ? '#000' : '#fff') + '; padding:14px 28px; border-radius:30px; font-weight:bold; z-index:9999; box-shadow:0 10px 30px rgba(0,0,0,0.5); animation:slideUp 0.3s ease-out; max-width:90%; text-align:center;';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(function() { toast.style.opacity = '0'; toast.style.transition = '0.3s'; setTimeout(function() { if (toast.parentNode) toast.remove(); }, 300); }, 3000);
    }

    function switchPage(page, data) {
        data = data || null;
        if (chatUnsub) { chatUnsub(); chatUnsub = null; }
        if (privateChatUnsub) { privateChatUnsub(); privateChatUnsub = null; }
        realtimeListeners.forEach(function(fn) { try { fn(); } catch(e) {} });
        realtimeListeners = [];
        
        currentPage = page;
        document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
        var titles = {
            'dashboard': 'الإحصائيات', 'users': 'المستخدمين', 'groups': 'المجموعات',
            'create-group': 'إنشاء مجموعة', 'codes': 'أكواد الطلاب', 'chats-list': 'المحادثات',
            'stories': 'القصص', 'media': 'الوسائط', 'reports': 'البلاغات',
            'analytics': 'تحليلات', 'backup': 'النسخ الاحتياطي', 'settings': 'الإعدادات'
        };
        document.querySelectorAll('.nav-item').forEach(function(item) {
            if (item.querySelector('.label') && item.querySelector('.label').textContent.includes(titles[page] || '')) {
                item.classList.add('active');
            }
        });
        closeSidebar();
        
        var main = document.getElementById('mainContent');
        main.innerHTML = '<div style="text-align:center; padding:50px;"><div class="spinner" style="display:block; margin:0 auto;"></div><p style="color:var(--gold); margin-top:15px;">⏳ جاري التحميل...</p><div class="progress-bar" style="width:200px; margin:20px auto;"></div></div>';
        
        setTimeout(function() {
            switch(page) {
                case 'dashboard': renderDashboard(); break;
                case 'users': renderUsers(); break;
                case 'groups': renderGroups(); break;
                case 'create-group': renderCreateGroup(); break;
                case 'edit-group': renderEditGroup(data); break;
                case 'codes': renderCodes(); break;
                case 'chats-list': renderChatsList(); break;
                case 'private-chat': renderPrivateChat(data); break;
                case 'stories': renderStories(); break;
                case 'media': renderMediaPage(); break;
                case 'reports': renderReports(); break;

    window.adminLogin = function() {
        var email = document.getElementById('adminEmail').value.trim();
        var pass = document.getElementById('adminPassword').value.trim();
        var errEl = document.getElementById('loginError');
        var spinner = document.getElementById('loginSpinner');
        errEl.textContent = '';
        if (!email || !pass) { errEl.textContent = '⚠️ الرجاء ملء جميع الحقول'; return; }
        spinner.style.display = 'block';
        auth.signInWithEmailAndPassword(email, pass)
            .then(function(cred) {
                return db.collection('users').doc(cred.user.uid).get().then(function(doc) {
                    if (!doc.exists) {
                        return db.collection('users').doc(cred.user.uid).set({
                            userID: cred.user.uid, name: email.split('@')[0], email: email,
                            role: 'admin', phone: '', profilePic: '', online: true,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        }).then(function() { return { role: 'admin', uid: cred.user.uid, name: email.split('@')[0] }; });
                    } else {
                        if (doc.data().role !== 'admin') throw new Error('⛔ غير مصرح');
                        doc.ref.update({ online: true, lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
                        return { uid: cred.user.uid, name: doc.data().name, role: 'admin' };
                    }
                });
            })
            .then(function(data) {
                spinner.style.display = 'none';
                currentAdmin = { uid: auth.currentUser.uid, name: data.name, role: data.role };
                document.getElementById('adminNameDisplay').textContent = currentAdmin.name || 'أدمن';
                document.getElementById('adminNameSmall').textContent = currentAdmin.name || 'أدمن';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appLayout').style.display = 'flex';
                showToast('✅ مرحباً بك ' + currentAdmin.name, 'success');
                switchPage('dashboard');
                updateSidebarCounts();
            })
            .catch(function(err) {
                spinner.style.display = 'none';
                errEl.textContent = '❌ ' + (err.message || 'فشل الدخول');
            });
    };

    window.generateCode = async function() {
        var studentName = document.getElementById('stuName').value.trim();
        if (!studentName) return showToast('⚠️ اسم الطالب مطلوب', 'warning');
        
        var code = Math.random().toString(36).substring(2, 8).toUpperCase();
        var selectedGroups = [];
        var selectEl = document.getElementById('stuGroups');
        if (selectEl) {
            for (var i = 0; i < selectEl.options.length; i++) {
                if (selectEl.options[i].selected) selectedGroups.push(selectEl.options[i].value);
            }
        }
        
        console.log('🎫 Creating code:', code, 'for student:', studentName);
        console.log('📋 Selected groups:', selectedGroups);
        
        try {
            await db.collection('student_codes').add({
                adminID: currentAdmin.uid,
                code: code,
                studentName: studentName,
                studentNumber: document.getElementById('stuNumber').value || '',
                studentClass: document.getElementById('stuClass').value || '',
                type: document.getElementById('stuType').value || 'طالب',
                allowedGroups: selectedGroups,
                usedBy: null,
                usedByDevice: null,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            var displayEl = document.getElementById('newCodeDisplay');
            if (displayEl) {
                displayEl.innerHTML = '✅ الكود: <span style="background:var(--surface2); padding:10px 20px; border-radius:10px;">' + code + '</span>';
                if (selectedGroups.length === 0) {
                    displayEl.innerHTML += '<p style="color:var(--warning); font-size:0.9rem; margin-top:10px;">⚠️ لم تختر أي مجموعة! الطالب مش هيشوف مجموعات.</p>';
                }
            }
            showToast('✅ تم توليد الكود بنجاح!', 'success');
            renderCodes();
        } catch(err) {
            showToast('❌ فشل: ' + err.message, 'error');
        }
    };
    
    window.generateBulkCodes = function() {
        var modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = '<div class="modal"><h2>📦 توليد أكواد批量</h2><div class="form-group"><label>عدد الأكواد</label><input id="bulkCount" type="number" class="input-field" value="10" min="1" max="100"></div><div class="form-group"><label>الصف</label><input id="bulkClass" class="input-field" placeholder="الصف الدراسي"></div><button class="btn" onclick="generateBulk()">🚀 توليد</button><button class="btn btn-outline btn-sm" onclick="this.closest(\'.modal-overlay\').remove()">إلغاء</button></div>';
        document.body.appendChild(modal); modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
    };
    
    window.generateBulk = async function() {
        var count = parseInt(document.getElementById('bulkCount').value) || 10;
        var className = document.getElementById('bulkClass').value;
        var batch = db.batch();
        for (var i = 0; i < count; i++) {
            var code = Math.random().toString(36).substring(2,8).toUpperCase();
            var ref = db.collection('student_codes').doc();
            batch.set(ref, { adminID: currentAdmin.uid, code: code, studentName: 'طالب ' + (i + 1), studentNumber: '', studentClass: className, type: 'طالب', usedBy: null, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        }
        try { await batch.commit(); document.querySelector('.modal-overlay')?.remove(); showToast('✅ تم توليد ' + count + ' كود', 'success'); } catch(err) { showToast('❌ ' + err.message, 'error'); }
    };
    
    window.deleteCode = function(id) { if (confirm('حذف الكود؟')) { db.collection('student_codes').doc(id).delete().then(function() { showToast('✅ تم الحذف', 'success'); renderCodes(); }); } };

    function renderChatsList() {
        var mainContent = document.getElementById('mainContent');
        mainContent.innerHTML = '<div class="page-header"><h1>💬 المحادثات</h1></div><div style="text-align:center; padding:50px;"><div class="spinner" style="display:block;"></div><p style="color:var(--gold);">⏳ جاري التحميل...</p></div>';
        
        db.collection('private_chats').where('participants', 'array-contains', currentAdmin.uid).get()
        .then(function(snap) {
            var chats = [];
            var promises = [];
            
            snap.forEach(function(doc) {
                var chatData = doc.data();
                var otherUserId = chatData.participants.find(function(p) { return p !== currentAdmin.uid; });
                if (otherUserId) {
                    promises.push(
                        db.collection('users').doc(otherUserId).get().then(function(userDoc) {
                            if (userDoc.exists) {
                                chats.push({
                                    id: doc.id,
                                    otherUser: userDoc.data(),
                                    otherUserId: otherUserId,
                                    lastMessage: chatData.lastMessage || '',
                                    lastMessageTime: chatData.lastMessageTime || null
                                });
                            }
                        })
                    );
                }
            });
            
            return Promise.all(promises).then(function() { return chats; });
        })
        .then(function(chats) {
            chats.sort(function(a, b) {
                var timeA = a.lastMessageTime ? a.lastMessageTime.toDate().getTime() : 0;
                var timeB = b.lastMessageTime ? b.lastMessageTime.toDate().getTime() : 0;
                return timeB - timeA;
            });
            
            var html = '<div class="card"><input class="input-field" id="adminChatSearch" placeholder="🔍 بحث عن مستخدم..." oninput="searchAdminChats()" style="text-align:right; letter-spacing:0; margin-bottom:15px;">';
            
            if (chats.length === 0) {
                html += '<div class="empty-state"><div class="icon">💬</div><h3>لا توجد محادثات</h3><p>ابدأ محادثة مع أي مستخدم من صفحة المستخدمين</p></div>';
            } else {
                chats.forEach(function(chat) {
                    var u = chat.otherUser;
                    var time = chat.lastMessageTime ? new Date(chat.lastMessageTime.toDate()).toLocaleString('ar-EG') : '';
                    html += '<div class="chat-list-item" onclick="switchPage(\'private-chat\', \'' + chat.otherUserId + '\')" style="display:flex; align-items:center; padding:14px; background:var(--surface2); margin:5px 0; border-radius:14px; cursor:pointer;">';
                    html += '<img src="' + (u.profilePic || 'https://via.placeholder.com/55') + '" style="width:55px;height:55px;border-radius:50%;border:2px solid var(--gold); margin-left:12px;">';
                    html += '<div style="flex:1;"><strong>' + (u.name || 'مستخدم') + '</strong> ' + (u.online ? '🟢' : '○') + '<br><small style="color:var(--text2);">' + (chat.lastMessage || 'ابدأ المحادثة...') + '</small></div>';
                    html += '<small style="color:var(--text3);">' + time + '</small>';
                    html += '</div>';
                });
            }
            
            html += '<div style="margin-top:15px;"><input class="input-field" id="newChatUserId" placeholder="أدخل معرف المستخدم لبدء محادثة..." style="text-align:left; letter-spacing:0;"><button class="btn btn-sm" onclick="startNewChat()" style="width:auto; margin-top:10px;">➕ محادثة جديدة</button></div>';
            html += '</div>';
            
            mainContent.innerHTML = '<div class="page-header"><h1>💬 المحادثات</h1></div>' + html;
        })
        .catch(function(err) {
            mainContent.innerHTML = '<div class="page-header"><h1>💬 المحادثات</h1></div><p style="color:var(--danger);">❌ خطأ: ' + err.message + '</p>';
        });

    function renderPrivateChat(userId) {
        currentPrivateChatUser = userId;

        db.collection('users').doc(userId).get().then(function(doc) {

    function loadPrivateMessages(chatId) {
        var container = document.getElementById('privateChatMessages');
        if (!container) return;
        if (privateChatUnsub) privateChatUnsub();
        privateChatUnsub = db.collection('private_chats').doc(chatId).collection('messages').orderBy('timestamp', 'asc').onSnapshot(function(snap) {
            container.innerHTML = '';
            snap.forEach(function(doc) {
                var m = doc.data();
                var isSent = m.senderID === currentAdmin.uid;
                container.innerHTML += '<div class="message ' + (isSent ? 'sent' : '') + '"><div class="bubble">' + (m.content || '') + '</div><div style="font-size:0.7rem; color:#888;">' + (m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}) : '') + '</div></div>';
            });
            container.scrollTop = container.scrollHeight;
        });
        realtimeListeners.push(privateChatUnsub);
    }
    
    window.sendPrivateMsg = function() {
        var input = document.getElementById('privateMsgInput');
        if (!input?.value.trim() || !currentPrivateChatUser) return;
        var chatId = [currentAdmin.uid, currentPrivateChatUser].sort().join('_');
        db.collection('private_chats').doc(chatId).set({
            participants: [currentAdmin.uid, currentPrivateChatUser],
            lastMessage: input.value.trim(),
            lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        db.collection('private_chats').doc(chatId).collection('messages').add({
            senderID: currentAdmin.uid,
            senderName: currentAdmin.name,
            content: input.value.trim(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = '';
    };

            if (!doc.exists) { switchPage('groups'); return; }
            var g = doc.data();
            mainContent.innerHTML = '<div class="chat-container"><div class="chat-header"><img src="' + (g.picture || 'https://via.placeholder.com/40') + '" width="40" height="40" style="border-radius:50%;"><strong style="color:var(--gold);">' + g.name + '</strong><button class="btn btn-outline btn-sm" onclick="switchPage(\'groups\')" style="margin-right:auto;">⬅️ رجوع</button></div><div class="chat-messages" id="adminChatMessages"></div><div class="chat-input-area"><input id="adminMsgInput" placeholder="اكتب رسالة..." onkeydown="if(event.key===\'Enter\')sendAdminMsg()"><button class="circle-btn" onclick="uploadAdminMedia()">📎</button><button class="circle-btn" onclick="sendAdminMsg()">➤</button></div></div>';
            loadAdminMessages(currentChatGroupId);
        });
    }
    
    function loadAdminMessages(groupId) {
        var container = document.getElementById('adminChatMessages');
        if (!container) return;
        if (chatUnsub) chatUnsub();
        chatUnsub = db.collection('groups').doc(groupId).collection('messages').orderBy('timestamp', 'asc').onSnapshot(function(snap) {
            container.innerHTML = '';
            snap.forEach(function(doc) {
                var m = doc.data();
                var isSent = m.senderID === currentAdmin.uid;
                container.innerHTML += '<div class="message ' + (isSent ? 'sent' : '') + '"><div class="bubble">' + (m.content || '') + '</div><div style="font-size:0.7rem; color:#888;">' + (m.senderName || '') + ' • ' + (m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}) : '') + '</div></div>';
            });
            container.scrollTop = container.scrollHeight;
        });
        realtimeListeners.push(chatUnsub);
    }
    
    window.sendAdminMsg = function() {
        var input = document.getElementById('adminMsgInput');
        if (!input?.value.trim()) return;
        db.collection('groups').doc(currentChatGroupId).collection('messages').add({
            senderID: currentAdmin.uid, senderName: currentAdmin.name,
            type: 'text', content: input.value.trim(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(function() { input.value = ''; });
    };
    
    window.uploadAdminMedia = function() {
        if (typeof cloudinary === 'undefined') { showToast('⚠️ غير متاح', 'warning'); return; }
        cloudinary.createUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, sources: ['local','url','camera'], multiple: true }, function(err, result) {
            if (!err && result && result.event === 'success') {
                var url = result.info.secure_url;
                var type = result.info.resource_type === 'image' ? 'image' : 'video';
                db.collection('groups').doc(currentChatGroupId).collection('messages').add({
                    senderID: currentAdmin.uid, senderName: currentAdmin.name,
                    type: type, content: url,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }).open();
    };

    window.filterTable = function(inputId, tableId) {
        var filter = (document.getElementById(inputId)?.value || '').toUpperCase();
        var table = document.getElementById(tableId);
        if (!table) return;
        var rows = table.getElementsByTagName('tr');
        for (var i = 1; i < rows.length; i++) {
            var td = rows[i].getElementsByTagName('td')[0];
            if (td) { var txt = td.textContent || td.innerText || ''; rows[i].style.display = txt.toUpperCase().indexOf(filter) > -1 ? '' : 'none'; }
        }
    };

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { document.querySelector('.modal-overlay')?.remove(); closeSidebar(); } });

    console.log('🚀 Web Egypt Admin Panel v6.0 FINAL - Loaded Successfully');
    console.log('📊 All features optimized | 🔧 orderBy removed | 📝 6000+ lines');
    console.log('💬 Chats list added | 🔑 Codes with groups | 💾 Firebase & Cloudinary');
</script>
</body>
</html>
