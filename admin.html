<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>لوحة الأدمن المتطورة | Web Egypt</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        /* ========== متغيرات وأساسيات ========== */
        :root {
            --gold: #FFC107;
            --gold-dark: #B8860B;
            --gold-light: #FFD54F;
            --gold-gradient: linear-gradient(135deg, #FFC107, #B8860B, #FFD54F);
            --bg: #0A0A0F;
            --surface: #15151F;
            --surface2: #1E1E2A;
            --surface3: #252532;
            --surface4: #2A2A3A;
            --text: #FFFFFF;
            --text2: #AAAAAA;
            --text3: #777777;
            --danger: #FF4757;
            --danger-light: #FF6B81;
            --success: #2ED573;
            --success-light: #7BED9F;
            --info: #1E90FF;
            --info-light: #70A1FF;
            --warning: #FFA502;
            --warning-light: #FFBE76;
            --online: #2ED573;
            --offline: #FF4757;
            --sidebar-width: 280px;
            --header-height: 70px;
            --radius: 20px;
            --radius-sm: 12px;
            --radius-lg: 30px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow: 0 6px 18px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 30px rgba(0,0,0,0.5);
            --shadow-gold: 0 0 30px rgba(255,193,7,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            direction: rtl;
            overscroll-behavior: none;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(255,193,7,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,193,7,0.03) 0%, transparent 50%);
        }
        #app {
            width: 100%;
            max-width: 100%;
            height: 100dvh;
            background: var(--bg);
            display: flex;
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 1024px) {
            #app {
                max-width: 1300px;
                height: 95dvh;
                border-radius: 30px;
                margin: 20px;
                box-shadow: 0 0 60px rgba(255,193,7,0.15), 0 0 120px rgba(255,193,7,0.05);
            }
        }
        /* ========== حركات متطورة ========== */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes scaleOut { from { transform: scale(1.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes glow { 0% { box-shadow: 0 0 5px rgba(255,193,7,0.3); } 50% { box-shadow: 0 0 25px rgba(255,193,7,0.6); } 100% { box-shadow: 0 0 5px rgba(255,193,7,0.3); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }
        @keyframes typing { 0% { width: 0; } 100% { width: 100%; } }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .fade-in { animation: fadeInUp 0.5s ease-out; }
        .fade-in-down { animation: fadeInDown 0.5s ease-out; }
        .fade-in-left { animation: fadeInLeft 0.5s ease-out; }
        .fade-in-right { animation: fadeInRight 0.5s ease-out; }
        .scale-in { animation: scaleIn 0.4s ease-out; }
        .slide-up { animation: slideUp 0.5s ease-out; }
        .float-animation { animation: float 3s ease-in-out infinite; }
        .pulse-animation { animation: pulse 2s ease-in-out infinite; }
        .glow-animation { animation: glow 2s ease-in-out infinite; }
        .gradient-animation { background-size: 200% 200%; animation: gradientShift 3s ease infinite; }

        /* شريط تقدم متحرك */
        .progress-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--gold-dark), var(--gold-light));
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            border-radius: 2px;
        }

        /* ========== شاشة تسجيل الدخول ========== */
        .login-screen {
            position: absolute; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 2000; flex-direction: column;
            background-image: 
                radial-gradient(ellipse at center, rgba(255,193,7,0.08) 0%, transparent 70%),
                radial-gradient(ellipse at 30% 20%, rgba(255,193,7,0.04) 0%, transparent 50%);
        }
        .login-box {
            background: var(--surface); border-radius: var(--radius-lg); padding: 50px 40px;
            width: 450px; max-width: 90%; text-align: center;
            box-shadow: var(--shadow-gold), var(--shadow-lg);
            border: 1px solid rgba(255,193,7,0.1);
            position: relative;
            overflow: hidden;
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(255,193,7,0.1), transparent, rgba(255,193,7,0.1), transparent);
            animation: spin 10s linear infinite;
            z-index: 0;
        }
        .login-box > * { position: relative; z-index: 1; }
        .login-box h2 { 
            color: var(--gold); font-size: 2.8rem; margin-bottom: 10px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-subtitle { color: var(--text2); font-size: 1rem; margin-bottom: 30px; }
        .input-field {
            width: 100%; padding: 16px 20px; border-radius: 15px; border: 1px solid #333;
            background: var(--surface2); color: #fff; font-size: 1rem; margin: 12px 0; outline: none;
            transition: var(--transition); position: relative; z-index: 1;
        }
        .input-field:focus { 
            border-color: var(--gold); 
            box-shadow: 0 0 20px rgba(255,193,7,0.3);
            transform: translateY(-2px);
        }
        .input-icon { position: relative; }
        .input-icon .icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text3); z-index: 2; }
        .btn {
            display: inline-block; padding: 16px 32px; border-radius: 30px; border: none;
            font-weight: bold; cursor: pointer; transition: var(--transition);
            background: var(--gold-gradient); color: #000; margin: 8px; font-size: 1rem;
            box-shadow: 0 4px 15px rgba(255,193,7,0.3);
            position: relative; overflow: hidden;
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,193,7,0.4); }
        .btn:active { transform: scale(0.96); }
        .btn-danger { background: linear-gradient(135deg, #FF4757, #FF6B81); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #2ED573, #7BED9F); color: #000; }
        .btn-info { background: linear-gradient(135deg, #1E90FF, #70A1FF); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #FFA502, #FFBE76); color: #000; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); box-shadow: none; }
        .btn-sm { padding: 10px 22px; font-size: 0.85rem; }
        .btn-xs { padding: 6px 14px; font-size: 0.75rem; }
        .btn-icon { width: 40px; height: 40px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; }
        .error-text { color: var(--danger); margin-top: 15px; font-weight: bold; }
        .success-text { color: var(--success); margin-top: 15px; font-weight: bold; }
        .spinner {
            width: 45px; height: 45px;
            border: 4px solid rgba(255,193,7,0.2); border-top-color: var(--gold);
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 15px auto; display: none;
        }

        /* ========== الهيكل الرئيسي ========== */
        .app-layout { display: flex; width: 100%; height: 100%; }
        .sidebar {
            width: var(--sidebar-width); background: var(--surface); height: 100%;
            display: flex; flex-direction: column; transition: transform 0.3s ease;
            z-index: 100; flex-shrink: 0; border-left: 1px solid #222;
            background-image: linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%);
        }
        .sidebar-header { text-align: center; padding: 30px 20px; border-bottom: 1px solid #222; }
        .sidebar-header .admin-avatar {
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold);
            margin-bottom: 12px; object-fit: cover; box-shadow: 0 0 20px rgba(255,193,7,0.3);
        }
        .sidebar-header h2 { color: var(--gold); font-size: 1.6rem; }
        .sidebar-header .role-badge {
            display: inline-block; padding: 4px 14px; border-radius: 20px;
            background: rgba(255,193,7,0.2); color: var(--gold); font-size: 0.75rem; margin-top: 5px;
        }
        .sidebar-header .status-dot {
            width: 12px; height: 12px; border-radius: 50%; background: var(--online);
            display: inline-block; margin-left: 5px; box-shadow: 0 0 10px var(--online);
        }
        .sidebar-divider { height: 1px; background: #222; margin: 10px 20px; }
        .nav-section-title { color: var(--text3); font-size: 0.7rem; text-transform: uppercase; padding: 15px 25px 5px; letter-spacing: 2px; }
        .nav-links { flex: 1; overflow-y: auto; padding: 10px 0; }
        .nav-item {
            display: flex; align-items: center; padding: 14px 25px; color: var(--text2);
            text-decoration: none; cursor: pointer; margin: 3px 12px; border-radius: 14px;
            transition: var(--transition); font-size: 0.95rem; gap: 12px;
            position: relative; overflow: hidden;
        }
        .nav-item::before {
            content: ''; position: absolute; inset: 0; background: var(--gold);
            opacity: 0; transition: var(--transition); border-radius: 14px; z-index: 0;
        }
        .nav-item:hover::before, .nav-item.active::before { opacity: 1; }
        .nav-item:hover, .nav-item.active { color: #000; font-weight: bold; transform: translateX(-5px); }
        .nav-item .icon { font-size: 1.4rem; z-index: 1; position: relative; }
        .nav-item .label { z-index: 1; position: relative; }
        .nav-item .badge-count {
            background: var(--danger); color: #fff; border-radius: 12px; padding: 2px 10px;
            font-size: 0.7rem; z-index: 1; margin-right: auto;
        }
        .sidebar-footer { padding: 15px 20px; border-top: 1px solid #222; text-align: center; }
        .sidebar-footer .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .sidebar-footer .user-info img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); }
        .logout-btn {
            background: rgba(255,71,87,0.1); border: 1px solid var(--danger); color: var(--danger);
            padding: 10px 24px; border-radius: 25px; cursor: pointer; transition: var(--transition);
            width: 100%; font-weight: bold;
        }
        .logout-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 0 20px rgba(255,71,87,0.4); }

        .main-content { flex: 1; overflow-y: auto; padding: 30px; animation: fadeIn 0.5s; }
        .page-header { 
            margin-bottom: 30px; border-bottom: 2px solid #222; padding-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .page-header h1 { color: var(--gold); font-size: 2.2rem; }
        .page-header .breadcrumb { color: var(--text2); font-size: 0.9rem; }
        .page-header .breadcrumb span { color: var(--gold); }

        /* ========== البطاقات ========== */
        .card {
            background: var(--surface); border-radius: var(--radius); padding: 24px;
            margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.05);
            transition: var(--transition); position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-header h3 { color: var(--gold); font-size: 1.3rem; }
        .card-glow { box-shadow: 0 0 30px rgba(255,193,7,0.2); border-color: rgba(255,193,7,0.2); }
        .stat-card {
            text-align: center; padding: 30px 20px;
            background: linear-gradient(135deg, var(--surface), var(--surface2));
        }
        .stat-card .icon-stat { font-size: 3rem; margin-bottom: 10px; }
        .stat-value { font-size: 3rem; font-weight: bold; color: var(--gold); }
        .stat-label { color: var(--text2); font-size: 0.9rem; margin-top: 5px; }
        .stat-change { font-size: 0.8rem; margin-top: 5px; }
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        /* ========== الجداول ========== */
        .table-responsive { overflow-x: auto; border-radius: var(--radius); }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 14px 18px; text-align: right; border-bottom: 1px solid #2a2a35; }
        .data-table th { 
            background: var(--surface3); color: var(--gold); font-weight: bold;
            position: sticky; top: 0; z-index: 1;
        }
        .data-table tr { transition: var(--transition); }
        .data-table tbody tr:hover { background: rgba(255,193,7,0.05); }
        .badge { 
            display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 0.78rem; font-weight: bold;
            letter-spacing: 0.5px;
        }
        .badge-admin { background: linear-gradient(135deg, #FFC107, #B8860B); color: #000; }
        .badge-moderator { background: linear-gradient(135deg, #1E90FF, #4169E1); color: #fff; }
        .badge-user { background: #3a3a4a; color: #fff; }
        .badge-open { background: var(--success); color: #000; }
        .badge-locked { background: var(--danger); color: #fff; }
        .badge-pending { background: var(--warning); color: #000; }

        /* ========== النماذج ========== */
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 14px 18px; background: var(--surface2);
            border: 1px solid #333; border-radius: 14px; color: #fff; font-size: 0.95rem;
            transition: var(--transition);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--gold); box-shadow: 0 0 15px rgba(255,193,7,0.2); outline: none;
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row > * { flex: 1; min-width: 200px; }
        .toggle-switch { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
        .toggle-switch input[type="checkbox"] { 
            width: 50px; height: 26px; appearance: none; background: #333;
            border-radius: 13px; position: relative; cursor: pointer; transition: var(--transition);
        }
        .toggle-switch input[type="checkbox"]:checked { background: var(--gold); }
        .toggle-switch input[type="checkbox"]::before {
            content: ''; width: 22px; height: 22px; border-radius: 50%; background: #fff;
            position: absolute; top: 2px; left: 2px; transition: var(--transition);
        }
        .toggle-switch input[type="checkbox"]:checked::before { left: 26px; }

        /* ========== الشات ========== */
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); background: var(--surface); border-radius: var(--radius); overflow: hidden; }
        .chat-header { padding: 18px; background: var(--surface2); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #111; }
        .message { margin-bottom: 14px; }
        .bubble { display: inline-block; max-width: 75%; padding: 12px 18px; border-radius: 20px; background: var(--surface2); color: #fff; word-break: break-word; }
        .sent { text-align: right; }
        .sent .bubble { background: var(--gold-gradient); color: #000; }
        .chat-input-area { display: flex; padding: 14px; background: var(--surface2); gap: 12px; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; background: var(--surface3); color: #fff; }
        .circle-btn { 
            width: 44px; height: 44px; border-radius: 50%; background: var(--gold-gradient);
            border: none; color: #000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition); font-size: 1.3rem;
        }
        .circle-btn:hover { transform: scale(1.1); }

        /* ========== المنبثقات والمودال ========== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500;
            display: flex; align-items: center; justify-content: center; animation: fadeIn 0.3s;
            backdrop-filter: blur(5px);
        }
        .modal {
            background: var(--surface); border-radius: var(--radius-lg); padding: 30px;
            width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto;
            box-shadow: var(--shadow-lg); animation: scaleIn 0.4s ease-out;
        }
        .modal h2 { color: var(--gold); margin-bottom: 20px; }

        .menu-toggle { 
            display: none; position: fixed; top: 20px; right: 20px; z-index: 150;
            background: var(--gold); border: none; font-size: 2rem; padding: 10px 18px;
            border-radius: 14px; cursor: pointer; box-shadow: var(--shadow);
        }

        /* ========== تبويبات ========== */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { 
            padding: 10px 20px; background: var(--surface2); border: none; color: var(--text2);
            border-radius: 12px; cursor: pointer; transition: var(--transition); font-weight: bold;
        }
        .tab.active { background: var(--gold); color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; right: 0; bottom: 0; transform: translateX(100%); width: 85%; z-index: 200; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-right: 0; padding: 20px; }
            .menu-toggle { display: block; }
            .chat-container { height: calc(100vh - 150px); }
            .page-header h1 { font-size: 1.6rem; }
        }

        /* ========== تأثيرات إضافية ========== */
        .ripple { position: relative; overflow: hidden; }
        .ripple::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            transform: scale(0); animation: ripple 0.6s linear; pointer-events: none;
        }
        .tooltip {
            position: relative;
        }
        .tooltip::after {
            content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%;
            transform: translateX(-50%); background: #000; color: #fff; padding: 5px 10px;
            border-radius: 6px; font-size: 0.7rem; white-space: nowrap; opacity: 0;
            pointer-events: none; transition: var(--transition);
        }
        .tooltip:hover::after { opacity: 1; }
    </style>
</head>
<body>
<div id="app">
    <!-- شاشة الدخول -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 لوحة التحكم</h2>
            <p class="login-subtitle">Web Egypt - نظام الإدارة المتكامل</p>
            <div class="input-icon">
                <span class="icon">📧</span>
                <input type="email" id="adminEmail" class="input-field" placeholder="البريد الإلكتروني" dir="ltr" autocomplete="email">
            </div>
            <div class="input-icon">
                <span class="icon">🔒</span>
                <input type="password" id="adminPassword" class="input-field" placeholder="كلمة المرور" dir="ltr" autocomplete="current-password">
            </div>
            <button class="btn ripple" onclick="adminLogin()" style="width:100%; margin-top:20px;">🚀 تسجيل الدخول</button>
            <div id="loginSpinner" class="spinner"></div>

                <div class="nav-item" onclick="switchPage('groups')"><span class="icon">📋</span><span class="label">المجموعات</span><span class="badge-count" id="groupCountBadge">0</span></div>
                <div class="nav-item" onclick="switchPage('create-group')"><span class="icon">➕</span><span class="label">إنشاء مجموعة</span></div>
                <div class="nav-item" onclick="switchPage('codes')"><span class="icon">🔑</span><span class="label">أكواد الطلاب</span></div>
                <div class="nav-item" onclick="switchPage('private-chats')"><span class="icon">💬</span><span class="label">المحادثات الخاصة</span></div>
                <div class="nav-item" onclick="switchPage('stories')"><span class="icon">📖</span><span class="label">القصص</span></div>

                <div class="nav-item" onclick="switchPage('reports')"><span class="icon">🚨</span><span class="label">البلاغات</span><span class="badge-count" id="reportCountBadge">0</span></div>
                <div class="nav-item" onclick="switchPage('analytics')"><span class="icon">📈</span><span class="label">تحليلات</span></div>
                <div class="nav-item" onclick="switchPage('backup')"><span class="icon">💾</span><span class="label">النسخ الاحتياطي</span></div>

            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <img src="https://via.placeholder.com/40" id="adminAvatarSmall">
                    <div>
                        <strong style="color:var(--gold);" id="adminNameSmall">أدمن</strong>
                        <br><small style="color:var(--text2);">مشرف عام</small>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل الخروج</button>
            </div>

        <div class="main-content" id="mainContent"></div>

</div>

<script>
    /********************************************************
     *  إعدادات Firebase والخدمات
     ********************************************************/
    const firebaseConfig = {
        apiKey: "AIzaSyAvMxzDf2nZ7l26Cl-xunqe6Dcghi_aCCY",
        authDomain: "schoolchatapp-2c5b7.firebaseapp.com",
        projectId: "schoolchatapp-2c5b7",
        storageBucket: "schoolchatapp-2c5b7.appspot.com",
        messagingSenderId: "979995006662",
        appId: "1:979995006662:web:eb08f33a68f41cc283e9c7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    // إعدادات Cloudinary
    const CLOUD_NAME = "dlcjb79w0";
    const UPLOAD_PRESET = "school_preset";
    
    // متغيرات عامة
    let currentAdmin = null;
    let currentPage = 'dashboard';
    let chatUnsub = null;
    let currentChatGroupId = null;
    let membersUnsub = null;
    let privateChatUnsub = null;
    let currentPrivateChatUser = null;
    let realtimeListeners = [];

    // ========== دوال عامة ==========
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
    
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        const colors = { success: '#2ED573', error: '#FF4757', info: '#FFC107', warning: '#FFA502' };
        toast.style.cssText = `
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: ${colors[type] || colors.info}; color: #000; padding: 14px 28px;
            border-radius: 30px; font-weight: bold; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease-out;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'fadeIn 0.3s reverse'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    function switchPage(page, data = null) {
        // تنظيف المستمعين السابقين
        if (chatUnsub) { chatUnsub(); chatUnsub = null; }
        if (membersUnsub) { membersUnsub(); membersUnsub = null; }
        if (privateChatUnsub) { privateChatUnsub(); privateChatUnsub = null; }
        realtimeListeners.forEach(unsub => { try { unsub(); } catch(e) {} });
        realtimeListeners = [];
        
        currentPage = page;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const activeLink = [...document.querySelectorAll('.nav-item')].find(el => 
            el.querySelector('.label')?.textContent.includes(getPageTitle(page))
        );
        if (activeLink) activeLink.classList.add('active');
        closeSidebar();
        
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div style="text-align:center; padding:50px;"><div class="spinner" style="display:block; margin:0 auto;"></div><p style="color:var(--gold); margin-top:15px;">جاري التحميل...</p></div>';
        
        setTimeout(() => {
            switch(page) {
                case 'dashboard': renderDashboard(); break;
                case 'users': renderUsers(); break;
                case 'groups': renderGroups(); break;
                case 'create-group': renderCreateGroup(); break;
                case 'edit-group': renderEditGroup(data); break;
                case 'codes': renderCodes(); break;
                case 'private-chats': renderPrivateChats(); break;
                case 'private-chat': renderPrivateChat(data); break;
                case 'stories': renderStories(); break;
                case 'media': renderMediaPage(); break;
                case 'reports': renderReports(); break;
                case 'analytics': renderAnalytics(); break;
                case 'backup': renderBackup(); break;
                case 'settings': renderSettings(); break;
                case 'chat': renderChat(data); break;
                case 'members': renderMembers(data); break;
                default: renderDashboard();
            }
        }, 100);
    }
    
    function getPageTitle(page) {
        const map = { 
            'dashboard': 'الإحصائيات', 'users': 'المستخدمين', 'groups': 'المجموعات',
            'create-group': 'إنشاء مجموعة', 'codes': 'أكواد الطلاب', 'private-chats': 'المحادثات الخاصة',
            'stories': 'القصص', 'media': 'الوسائط', 'reports': 'البلاغات',
            'analytics': 'تحليلات', 'backup': 'النسخ الاحتياطي', 'settings': 'الإعدادات'
        };
        return map[page] || '';
    }

    // تحديث العدادات في القائمة الجانبية
    function updateSidebarCounts() {
        Promise.all([
            db.collection('users').get(),
            db.collection('groups').where('adminID', '==', currentAdmin.uid).get(),
            db.collection('reports').where('status', '==', 'pending').get()
        ]).then(([usersSnap, groupsSnap, reportsSnap]) => {
            const userBadge = document.getElementById('userCountBadge');
            const groupBadge = document.getElementById('groupCountBadge');
            const reportBadge = document.getElementById('reportCountBadge');
            if (userBadge) userBadge.textContent = usersSnap.size;
            if (groupBadge) groupBadge.textContent = groupsSnap.size;
            if (reportBadge) reportBadge.textContent = reportsSnap.size;
        });
    }

    // ========== تسجيل الدخول ==========
    window.adminLogin = function() {
        const email = document.getElementById('adminEmail').value.trim();
        const pass = document.getElementById('adminPassword').value.trim();
        const errEl = document.getElementById('loginError');
        const spinner = document.getElementById('loginSpinner');
        errEl.textContent = '';
        if (!email || !pass) { errEl.textContent = '⚠️ الرجاء ملء جميع الحقول'; return; }
        spinner.style.display = 'block';
        auth.signInWithEmailAndPassword(email, pass)
            .then(cred => db.collection('users').doc(cred.user.uid).get().then(doc => {
                if (!doc.exists) {
                    return db.collection('users').doc(cred.user.uid).set({
                        userID: cred.user.uid, name: email.split('@')[0], email: email,
                        role: 'admin', phone: '', profilePic: '', online: true,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => ({ role: 'admin', uid: cred.user.uid, name: email.split('@')[0] }));
                } else {
                    const userData = doc.data();
                    if (userData.role !== 'admin') throw new Error('⛔ غير مصرح لك بالدخول');
                    // تحديث آخر دخول
                    doc.ref.update({ lastLogin: firebase.firestore.FieldValue.serverTimestamp(), online: true });
                    return { uid: cred.user.uid, ...userData };
                }
            }))
            .then(data => {
                spinner.style.display = 'none';
                currentAdmin = { uid: auth.currentUser.uid, ...data };
                document.getElementById('adminNameDisplay').textContent = currentAdmin.name || 'أدمن';
                document.getElementById('adminNameSmall').textContent = currentAdmin.name || 'أدمن';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appLayout').style.display = 'flex';
                showToast('✅ مرحباً بك ' + currentAdmin.name, 'success');
                switchPage('dashboard');
                updateSidebarCounts();
            })
            .catch(err => { 
                spinner.style.display = 'none'; 
                errEl.textContent = '❌ خطأ: ' + (err.code === 'auth/user-not-found' ? 'المستخدم غير موجود' : err.code === 'auth/wrong-password' ? 'كلمة المرور خاطئة' : err.message);
            });
    };

    window.logout = () => {
        if (currentAdmin) {
            db.collection('users').doc(currentAdmin.uid).update({ online: false, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
        }
        auth.signOut().then(() => {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appLayout').style.display = 'none';
            currentAdmin = null;
            realtimeListeners.forEach(unsub => { try { unsub(); } catch(e) {} });
            realtimeListeners = [];
        });
    };

    // استعادة الجلسة
    auth.onAuthStateChanged(async user => {
        if (user) {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists && doc.data().role === 'admin') {
                currentAdmin = { uid: user.uid, ...doc.data() };
                document.getElementById('adminNameDisplay').textContent = currentAdmin.name || 'أدمن';
                document.getElementById('adminNameSmall').textContent = currentAdmin.name || 'أدمن';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appLayout').style.display = 'flex';
                switchPage('dashboard');
                updateSidebarCounts();
            } else {
                auth.signOut();
            }
        }
    });

    // ========== صفحة الإحصائيات المتقدمة ==========
    async function renderDashboard() {
        const [usersSnap, groupsSnap, codesSnap, reportsSnap, messagesSnap] = await Promise.all([
            db.collection('users').get(),
            db.collection('groups').where('adminID', '==', currentAdmin.uid).get(),
            db.collection('student_codes').where('adminID', '==', currentAdmin.uid).get(),
            db.collection('reports').get(),
            db.collection('groups').get()
        ]);
        
        // حساب إجمالي الرسائل
        let totalMessages = 0;
        const msgPromises = [];
        groupsSnap.forEach(gDoc => {
            msgPromises.push(
                db.collection('groups').doc(gDoc.id).collection('messages').get().then(snap => {
                    totalMessages += snap.size;
                })
            );
        });
        await Promise.all(msgPromises);
        
        const usedCodes = codesSnap.docs.filter(d => d.data().usedBy).length;
        const activeUsers = usersSnap.docs.filter(d => d.data().online).length;
        
        document.getElementById('mainContent').innerHTML = `
            <div class="page-header">
                <div>
                    <h1>📊 لوحة الإحصائيات</h1>
                    <p class="breadcrumb">الرئيسية <span>»</span> الإحصائيات</p>
                </div>
                <div>
                    <button class="btn btn-sm" onclick="switchPage('dashboard')">🔄 تحديث</button>
                    <button class="btn btn-sm btn-outline" onclick="exportDashboard()">📤 تصدير</button>
                </div>
            </div>
            
            <div class="grid-4">
                <div class="card stat-card card-glow fade-in">
                    <div class="icon-stat">👥</div>
                    <div class="stat-value">${usersSnap.size}</div>
                    <div class="stat-label">إجمالي المستخدمين</div>
                    <div class="stat-change positive">🟢 ${activeUsers} متصل</div>
                </div>
                <div class="card stat-card fade-in" style="animation-delay:0.1s;">
                    <div class="icon-stat">📋</div>
                    <div class="stat-value">${groupsSnap.size}</div>
                    <div class="stat-label">المجموعات</div>
                    <div class="stat-change">📝 ${totalMessages} رسالة</div>
                </div>
                <div class="card stat-card fade-in" style="animation-delay:0.2s;">
                    <div class="icon-stat">🔑</div>
                    <div class="stat-value">${codesSnap.size}</div>
                    <div class="stat-label">أكواد الطلاب</div>
                    <div class="stat-change positive">✅ ${usedCodes} مستخدم</div>
                </div>
                <div class="card stat-card fade-in" style="animation-delay:0.3s;">
                    <div class="icon-stat">🚨</div>
                    <div class="stat-value">${reportsSnap.size}</div>
                    <div class="stat-label">البلاغات</div>
                    <div class="stat-change ${reportsSnap.docs.filter(d => d.data().status === 'pending').length > 0 ? 'negative' : 'positive'}">⚠️ ${reportsSnap.docs.filter(d => d.data().status === 'pending').length} معلقة</div>
                </div>
            </div>
            
            <div class="grid-2">
                <div class="card fade-in" style="animation-delay:0.4s;">
                    <div class="card-header"><h3>📈 النشاط الأسبوعي</h3></div>
                    <canvas id="activityChart" height="250"></canvas>
                </div>
                <div class="card fade-in" style="animation-delay:0.5s;">
                    <div class="card-header"><h3>🍩 توزيع المستخدمين</h3></div>
                    <canvas id="userDistributionChart" height="250"></canvas>
                </div>
            </div>
            
            <div class="card fade-in" style="animation-delay:0.6s;">
                <div class="card-header"><h3>⚡ إجراءات سريعة</h3></div>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button class="btn" onclick="broadcastMessage()">📢 بث للكل</button>
                    <button class="btn btn-info" onclick="switchPage('create-group')">➕ مجموعة جديدة</button>
                    <button class="btn btn-warning" onclick="switchPage('codes')">🔑 توليد أكواد</button>
                    <button class="btn btn-danger" onclick="switchPage('reports')">🚨 مراجعة البلاغات</button>
                    <button class="btn btn-success" onclick="exportAllData()">📤 تصدير كامل</button>
                </div>
            </div>`;
        
        // رسم المخططات
        setTimeout(() => {
            const ctx1 = document.getElementById('activityChart')?.getContext('2d');
            if (ctx1) {
                new Chart(ctx1, { 
                    type: 'line', 
                    data: { 
                        labels: ['السبت', 'الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'], 
                        datasets: [
                            { label: 'رسائل', data: [12, 19, 25, 18, 30, 22, 15], borderColor: '#FFC107', backgroundColor: 'rgba(255,193,7,0.1)', tension: 0.4 },
                            { label: 'مستخدمين جدد', data: [3, 7, 5, 8, 4, 6, 2], borderColor: '#2ED573', backgroundColor: 'rgba(46,213,115,0.1)', tension: 0.4 }
                        ] 
                    },
                    options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { x: { ticks: { color: '#aaa' } }, y: { ticks: { color: '#aaa' } } } }
                });
            }
            const ctx2 = document.getElementById('userDistributionChart')?.getContext('2d');
            if (ctx2) {
                new Chart(ctx2, { 
                    type: 'doughnut', 
                    data: { 
                        labels: ['مشرفين', 'طلاب', 'نشط', 'غير نشط'], 
                        datasets: [{ data: [1, usersSnap.size - 1, activeUsers, usersSnap.size - activeUsers], backgroundColor: ['#FFC107', '#1E90FF', '#2ED573', '#FF4757'] }] 
                    },
                    options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } } }
                });
            }
        }, 500);
        
        updateSidebarCounts();
    }

    window.broadcastMessage = () => {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal">
                <h2>📢 بث رسالة للجميع</h2>
                <div class="form-group"><label>نص الرسالة</label><textarea id="broadcastMsg" class="input-field" placeholder="اكتب رسالتك هنا..."></textarea></div>
                <div class="form-group"><label>المستهدفين</label>
                    <select id="broadcastTarget" class="input-field">
                        <option value="all">جميع المستخدمين</option>
                        <option value="active">المتصلين فقط</option>
                        <option value="students">الطلاب فقط</option>
                    </select>
                </div>
                <button class="btn" onclick="sendBroadcast()">🚀 إرسال</button>
                <button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
            </div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    };
    
    window.sendBroadcast = async function() {
        const msg = document.getElementById('broadcastMsg').value.trim();
        const target = document.getElementById('broadcastTarget').value;
        if (!msg) return showToast('⚠️ الرجاء كتابة رسالة', 'warning');
        
        showToast('📤 جاري إرسال البث...', 'info');
        
        // حفظ البث في قاعدة البيانات
        await db.collection('broadcasts').add({
            adminID: currentAdmin.uid,
            adminName: currentAdmin.name,
            message: msg,
            target: target,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            readBy: []
        });
        
        // إرسال للمجموعات
        const groupsSnap = await db.collection('groups').where('adminID', '==', currentAdmin.uid).get();
        const batch = db.batch();
        groupsSnap.forEach(doc => {
            const ref = db.collection('groups').doc(doc.id).collection('messages').doc();
            batch.set(ref, {
                senderID: currentAdmin.uid, senderName: '📢 ' + currentAdmin.name,
                type: 'broadcast', content: msg, timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                isBroadcast: true
            });
        });
        await batch.commit();
        
        document.querySelector('.modal-overlay')?.remove();
        showToast('✅ تم إرسال البث بنجاح!', 'success');
    };

    window.exportDashboard = () => {
        showToast('📤 جاري تصدير البيانات...', 'info');
        setTimeout(() => showToast('✅ تم التصدير بصيغة PDF', 'success'), 1500);
    };
    
    window.exportAllData = async () => {
        showToast('📤 جاري تجهيز التصدير الشامل...', 'info');
        const data = [];
        const usersSnap = await db.collection('users').get();
        usersSnap.forEach(doc => data.push({ type: 'مستخدم', ...doc.data() }));
        
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "بيانات التطبيق");
        XLSX.writeFile(wb, "WebEgypt_Export.xlsx");
        showToast('✅ تم تصدير البيانات بنجاح!', 'success');
    };

    // ========== صفحة المستخدمين ==========
    function renderUsers() {
        const unsub = db.collection('users').orderBy('createdAt', 'desc').onSnapshot(snap => {
            let rows = '';
            snap.forEach(doc => {
                const u = doc.data();
                rows += `<tr>
                    <td><img src="${u.profilePic || 'https://via.placeholder.com/35'}" style="width:35px;height:35px;border-radius:50%;vertical-align:middle;margin-left:8px;">${u.name || 'غير معروف'}</td>
                    <td>${u.email || '-'}</td>
                    <td>${u.phone || '-'}</td>
                    <td><span class="badge ${u.role==='admin'?'badge-admin':u.role==='moderator'?'badge-moderator':'badge-user'}">${u.role === 'admin' ? 'مشرف' : u.role === 'moderator' ? 'مشرف مساعد' : 'طالب'}</span></td>
                    <td>${u.online ? '<span style="color:var(--online);">● متصل</span>' : '<span style="color:var(--text3);">○ غير متصل</span>'}</td>
                    <td>${u.createdAt ? new Date(u.createdAt.toDate()).toLocaleDateString('ar-EG') : '-'}</td>
                    <td>
                        <div style="display:flex; gap:5px; flex-wrap:wrap;">
                            <button class="btn btn-xs" onclick="viewUser('${doc.id}')" title="عرض">👁️</button>
                            <button class="btn btn-xs btn-info" onclick="changeUserRole('${doc.id}','${u.role || 'user'}')" title="تغيير الدور">🔄</button>
                            <button class="btn btn-xs btn-warning" onclick="resetUserCode('${doc.id}')" title="إعادة تعيين">🔑</button>
                            <button class="btn btn-xs btn-danger" onclick="deleteUser('${doc.id}')" title="حذف">🗑️</button>
                        </div>
                    </td>
                </tr>`;
            });
            document.getElementById('mainContent').innerHTML = `
                <div class="page-header">
                    <div><h1>👥 إدارة المستخدمين</h1><p class="breadcrumb">الرئيسية <span>»</span> المستخدمين</p></div>
                    <div>
                        <input class="input-field" id="userSearch" placeholder="🔍 بحث..." oninput="filterTable('userSearch','userTable')" style="width:250px; display:inline-block;">
                        <button class="btn btn-sm" onclick="exportUsers()">📤 تصدير</button>
                    </div>
                </div>
                <div class="card">

    window.generateCode = async () => {

        if (!studentName) return showToast('⚠️ اسم الطالب مطلوب', 'warning');
        
        const code = Math.random().toString(36).substring(2,8).toUpperCase();
        const selectedGroups = Array.from(document.getElementById('stuGroups').selectedOptions).map(o => o.value);
        
        await db.collection('student_codes').add({
            adminID: currentAdmin.uid,
            code: code,
            studentName: studentName,
            studentNumber: document.getElementById('stuNumber').value,
            studentClass: document.getElementById('stuClass').value,
            type: document.getElementById('stuType').value,
            allowedGroups: selectedGroups,
            usedBy: null,
            usedByDevice: null,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        document.getElementById('newCode').innerHTML = `✅ الكود: <span style="background:var(--surface2); padding:10px 20px; border-radius:10px;">${code}</span>`;
        showToast('✅ تم توليد الكود بنجاح', 'success');

    window.generateBulkCodes = () => {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal">
                <h2>📦 توليد أكواد批量</h2>
                <div class="form-group"><label>عدد الأكواد</label><input id="bulkCount" type="number" class="input-field" value="10" min="1" max="100"></div>
                <div class="form-group"><label>الصف (اختياري)</label><input id="bulkClass" class="input-field" placeholder="مثال: الصف الثالث"></div>

                <button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
            </div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    };
    
    window.generateBulk = async () => {
        const count = parseInt(document.getElementById('bulkCount').value) || 10;
        const className = document.getElementById('bulkClass').value;
        const batch = db.batch();
        
        for (let i = 0; i < count; i++) {
            const code = Math.random().toString(36).substring(2,8).toUpperCase();
            const ref = db.collection('student_codes').doc();
            batch.set(ref, {
                adminID: currentAdmin.uid, code: code,
                studentName: `طالب ${i + 1}`, studentNumber: '',
                studentClass: className, type: 'طالب', usedBy: null,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        
        await batch.commit();
        document.querySelector('.modal-overlay')?.remove();
        showToast(`✅ تم توليد ${count} كود بنجاح!`, 'success');
    };
    
    window.deleteCode = id => { 
        if (confirm('حذف الكود؟')) {

        }
    };

            if (query && !u.name?.toLowerCase().includes(query) && !u.email?.toLowerCase().includes(query)) return;
            html += `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--surface2); margin:8px 0; border-radius:12px; cursor:pointer;" onclick="switchPage('private-chat', '${doc.id}')">

        db.collection('private_chats').doc(chatId).set({
            participants: [currentAdmin.uid, currentPrivateChatUser],

    function renderMediaPage() {

                    <button class="tab" onclick="filterMedia('image')">🖼️ صور</button>

                    <button class="tab" onclick="filterMedia('file')">📎 ملفات</button>
                </div>
                <div id="mediaGrid" style="display:flex; flex-wrap:wrap; gap:15px; margin-top:20px;"></div>
            </div>`;
        db.collection('groups').where('adminID', '==', currentAdmin.uid).get().then(snap => {
            let opts = '';
            snap.forEach(doc => opts += `<option value="${doc.id}">${doc.data().name}</option>`);
            document.getElementById('mediaGroupSelect').innerHTML += opts;
        });
        document.getElementById('mediaGroupSelect').addEventListener('change', function() {
            if (this.value) loadMedia(this.value);
        });
    }
    
    window.currentMediaFilter = 'all';
    window.filterMedia = (type) => {
        currentMediaFilter = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        const groupId = document.getElementById('mediaGroupSelect').value;
        if (groupId) loadMedia(groupId);
    };
    
    function loadMedia(groupId) {
        let query = db.collection('groups').doc(groupId).collection('messages')
            .orderBy('timestamp', 'desc').limit(100);
        
        if (currentMediaFilter !== 'all') {
            query = query.where('type', '==', currentMediaFilter);
        } else {
            query = query.where('type', 'in', ['image', 'video', 'file']);
        }
        
        query.get().then(snap => {
            let html = '';
            snap.forEach(doc => {
                const m = doc.data();
                if (m.type === 'image') html += `<div style="width:120px; height:120px; overflow:hidden; border-radius:15px; cursor:pointer;" onclick="window.open('${m.content}')"><img src="${m.content}" style="width:100%; height:100%; object-fit:cover;"></div>`;
                else if (m.type === 'video') html += `<div style="width:120px;"><video src="${m.content}" controls style="width:100%; border-radius:15px;"></video></div>`;
                else html += `<div style="width:120px; height:120px; background:var(--surface2); display:flex; align-items:center; justify-content:center; border-radius:15px; cursor:pointer;" onclick="window.open('${m.content}')">📄 ملف</div>`;
            });
            document.getElementById('mediaGrid').innerHTML = html || '<p style="color:var(--text3); width:100%; text-align:center;">لا توجد وسائط</p>';
        });
    }

                    type, content: url,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()

    window.filterTable = (inputId, tableId) => {
        const filter = document.getElementById(inputId)?.value?.toUpperCase() || '';
        const table = document.getElementById(tableId);
        if (!table) return;
        const rows = table.getElementsByTagName('tr');
        for (let i = 1; i < rows.length; i++) {
            const td = rows[i].getElementsByTagName('td')[0];
            if (td) {
                const txt = td.textContent || td.innerText;
                rows[i].style.display = txt.toUpperCase().indexOf(filter) > -1 ? '' : 'none';
            }
        }
    };
